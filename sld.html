<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NEM SLD – GridXplore Oz</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0d1117; color: #1a1a2e;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── Header ── */
    #header {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 8px 14px;
      background: #161b22; border-bottom: 1px solid #30363d;
    }
    #header h1 { font-size: 14px; color: #58a6ff; white-space: nowrap; margin-right: 4px; }

    .state-btn {
      padding: 4px 13px; border: 1px solid #30363d; border-radius: 4px;
      background: #21262d; color: #e6edf3; cursor: pointer;
      font-size: 12px; font-weight: 600; letter-spacing: 0.3px;
    }
    .state-btn.active { background: #1f6feb; border-color: #58a6ff; color: #fff; }
    .state-btn:hover:not(.active) { background: #30363d; }

    .volt-legend { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-left: 6px; }
    .vl { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #8b949e; }
    .vl-line { border-radius: 1px; }

    #header a { font-size: 11px; color: #8b949e; text-decoration: none; margin-left: auto; }
    #header a:hover { color: #e6edf3; }
    #breadcrumb { align-items: center; gap: 2px; }
    #bc-state:hover { color: #79c0ff; }

    /* ── Canvas ── */
    #sld-wrap { flex: 1; position: relative; overflow: hidden; }
    svg#sld { width: 100%; height: 100%; background: #fafaf8; display: block; }

    /* ── Loading overlay ── */
    #loading {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      background: rgba(250,250,248,0.95); border: 1px solid #ccc; border-radius: 6px;
      padding: 12px 20px; font-size: 14px; color: #555; z-index: 50;
    }

    /* ── Popup — same dark style as main map ── */
    #sld-popup {
      position: absolute;
      background: #161b22; color: #e6edf3;
      border: 1px solid #30363d; border-radius: 8px;
      padding: 14px 16px; max-width: 320px; min-width: 220px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      font-size: 13px; z-index: 100; display: none;
      pointer-events: auto;
    }
    .popup-close {
      position: absolute; top: 6px; right: 10px;
      color: #8b949e; font-size: 18px; cursor: pointer; line-height: 1;
    }
    .popup-close:hover { color: #e6edf3; }
    .popup-title { font-size: 14px; font-weight: 700; color: #58a6ff; margin-bottom: 10px; padding-right: 22px; line-height: 1.3; }
    .popup-grid { display: grid; grid-template-columns: auto 1fr; gap: 3px 10px; }
    .popup-label { color: #8b949e; font-size: 12px; white-space: nowrap; }
    .popup-value { color: #e6edf3; font-size: 12px; }
    .popup-section { margin-top: 10px; padding-top: 8px; border-top: 1px solid #30363d; }
    .popup-section-title { font-size: 11px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
    .project-item { padding: 3px 0; font-size: 12px; border-bottom: 1px solid #21262d; }
    .project-item:last-child { border: none; }
    .mlf-good { color: #3fb950; }
    .mlf-ok   { color: #d29922; }
    .mlf-poor { color: #f85149; }

    /* ── Cursor on interactive elements ── */
    .sub-group { cursor: pointer; }
    .edge-hit   { cursor: pointer; }
    .gen-sym    { cursor: pointer; }
  </style>
</head>
<body>

<div id="header">
  <h1>⚡ NEM Single Line Diagram</h1>
  <div style="display:flex;gap:3px">
    <button class="state-btn" data-state="Queensland">QLD</button>
    <button class="state-btn" data-state="New South Wales">NSW</button>
    <button class="state-btn active" data-state="Victoria">VIC</button>
    <button class="state-btn" data-state="South Australia">SA</button>
    <button class="state-btn" data-state="Tasmania">TAS</button>
  </div>
  <div class="volt-legend">
    <div class="vl"><div class="vl-line" style="width:22px;height:5px;background:#ffe033"></div>500kV</div>
    <div class="vl"><div class="vl-line" style="width:22px;height:4px;background:#f08020"></div>330kV</div>
    <div class="vl"><div class="vl-line" style="width:22px;height:3.5px;background:#d040c0"></div>275kV</div>
    <div class="vl"><div class="vl-line" style="width:22px;height:3px;background:#4496e0"></div>220kV</div>
    <div class="vl"><div class="vl-line" style="width:22px;height:2.5px;background:#d84040"></div>132kV</div>
    <div class="vl"><div class="vl-line" style="width:22px;height:2px;background:#a05020"></div>66kV</div>
    <div class="vl" style="font-size:9px;color:#555">── single &nbsp; ══ double circuit</div>
    <div class="vl"><div style="width:10px;height:10px;border-radius:50%;background:#3fb950;border:1.5px solid #888"></div>Operating</div>
    <div class="vl"><div style="width:10px;height:10px;border-radius:50%;background:#d29922;border:1.5px solid #888"></div>Construction</div>
  </div>
  <div id="breadcrumb" style="display:none;font-size:12px;color:#8b949e;margin-left:4px">
    <span id="bc-state" style="cursor:pointer;color:#58a6ff;text-decoration:underline"></span>
    <span style="margin:0 4px">›</span>
    <span id="bc-region" style="color:#e6edf3"></span>
  </div>
  <a href="index.html">← Map View</a>
</div>

<div id="sld-wrap">
  <svg id="sld"></svg>
  <div id="loading">Loading…</div>
  <div id="sld-popup">
    <span class="popup-close" id="popup-close">×</span>
    <div id="popup-body"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════════════════════════════════════
const VC = { 500:'#ffe033', 330:'#f08020', 275:'#d040c0', 220:'#4496e0', 132:'#d84040', 110:'#d84040', 66:'#a05020' };
const VW = { 500:5.5, 330:5, 275:4.5, 220:4, 132:3, 110:3, 66:2.5 };

const BUS_SPACING = 72;   // vertical gap between bus bars (needs room for 2×XFMR_R overlap symbol)
const BUS_PAD     = 18;   // padding at each end of bus bar beyond last connection
const SLOT_W      = 30;   // horizontal space per connection slot
const BUS_MIN_HW  = 55;   // minimum bus bar half-width
const XFMR_R      = 9;    // transformer circle radius
const GEN_R       = 10;   // generator symbol radius
const GEN_STEP    = 26;   // horizontal spacing between gen symbols
const SIM_TICKS   = 1200;
const GAP_PX      = 8;    // pixels either side of a crossing gap

// ══════════════════════════════════════════════════════════════════════════════
//  METRO REGIONS — geographic bounding boxes collapsed to single box nodes
//  latMin/Max, lngMin/Max in decimal degrees
// ══════════════════════════════════════════════════════════════════════════════
const METRO_REGIONS = {
  'New South Wales': [
    { id: 'metro_snw', label: 'Sydney–Newcastle–Wollongong',
      shortLabel: 'Sydney / Newcastle / Wollongong metro',
      latMin: -34.7, latMax: -32.6, lngMin: 150.0, lngMax: 151.9 }
  ],
  'Queensland': [
    { id: 'metro_seq', label: 'South-East Queensland',
      shortLabel: 'Brisbane / Gold Coast / Sunshine Coast metro',
      latMin: -28.3, latMax: -26.8, lngMin: 152.5, lngMax: 153.7 }
  ],
  'Victoria': [],   // VIC is dense but manageable as one view
  'South Australia': [],
  'Tasmania': []
};

function getMetroRegions(stateName) { return METRO_REGIONS[stateName] || []; }

function inMetroRegion(geo, region) {
  if (!geo) return false;
  return geo.lat >= region.latMin && geo.lat <= region.latMax &&
         geo.lng >= region.lngMin && geo.lng <= region.lngMax;
}

// ══════════════════════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════════════════════
let allLines, allSubs, allProjects, allMlf;
let currentState  = 'Victoria';
let currentRegion = null;   // null = full state; string = metro region id

// ══════════════════════════════════════════════════════════════════════════════
//  SVG + ZOOM
// ══════════════════════════════════════════════════════════════════════════════
const wrap = document.getElementById('sld-wrap');
const svg  = d3.select('#sld');
const root = svg.append('g').attr('id', 'root');

const zb = d3.zoom().scaleExtent([0.05, 14])
  .on('zoom', ({transform}) => root.attr('transform', transform));
svg.call(zb);

// Dismiss popup on canvas click (not on popup itself)
svg.on('click', () => hidePopup());

// ══════════════════════════════════════════════════════════════════════════════
//  POPUP
// ══════════════════════════════════════════════════════════════════════════════
const popupEl   = document.getElementById('sld-popup');
const popupBody = document.getElementById('popup-body');
document.getElementById('popup-close').addEventListener('click', hidePopup);

function showPopup(html, svgX, svgY) {
  popupBody.innerHTML = html;
  popupEl.style.display = 'block';

  // Convert SVG coords to screen coords via current transform
  const t = d3.zoomTransform(svg.node());
  const sx = t.applyX(svgX);
  const sy = t.applyY(svgY);

  const pw = popupEl.offsetWidth  || 280;
  const ph = popupEl.offsetHeight || 200;
  const vw = wrap.clientWidth;
  const vh = wrap.clientHeight;

  popupEl.style.left = Math.min(sx + 12, vw - pw - 8) + 'px';
  popupEl.style.top  = Math.min(Math.max(sy - ph / 2, 4), vh - ph - 4) + 'px';
}
function hidePopup() { popupEl.style.display = 'none'; }

// ══════════════════════════════════════════════════════════════════════════════
//  DATA LOADING
// ══════════════════════════════════════════════════════════════════════════════
Promise.all([
  fetch('transmission_lines.geojson').then(r => r.json()),
  fetch('substations.geojson').then(r => r.json()),
  fetch('competing_projects.geojson').then(r => r.json()),
  fetch('data/mlf_2026_27.json').then(r => r.json()).catch(() => []),
]).then(([l, s, p, m]) => {
  allLines = l; allSubs = s; allProjects = p; allMlf = m;
  document.getElementById('loading').style.display = 'none';
  renderState(currentState);
});

document.querySelectorAll('.state-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.state-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderState(btn.dataset.state, null);
  });
});

// ══════════════════════════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════════════════════════
function normSub(s) {
  if (!s) return '';
  s = s.replace(/\s+\([^)]+\)\s*$/, '');
  s = s.replace(/\s+(terminal\s+station|terminal|substation|tee|tap)\s*$/gi, '');
  s = s.replace(/\s+(north|south|east|west)\s*$/gi, '');
  return s.trim();
}

function parseEps(name) {
  if (!name) return null;
  const m = name.match(/^(.+?)\s+to\s+(.+?)(?:\s+\([^)]+\))*\s*$/i);
  return m ? [m[1].trim(), m[2].trim()] : null;
}

function techCode(es) {
  if (!es) return 'GEN';
  const l = es.toLowerCase();
  if (l.includes('wind'))  return 'W';
  if (l.includes('solar') || l.includes('csp') || l.includes('floating')) return 'PV';
  if (l.includes('battery') || l.includes('lib') || l.includes('flow') || l.includes('caes')) return 'BESS';
  if (l === 'conventional hydro')  return 'H';
  if (l === 'pumped storage')      return 'PS';
  if (l.includes('gas') || l.includes('electrolyzer')) return 'GT';
  if (l.includes('coal'))  return 'SG';
  if (l.includes('bio') || l.includes('methane')) return 'BIO';
  return 'GEN';
}

function mlfClass(v) {
  if (v == null) return '';
  return v >= 0.97 ? 'mlf-good' : v >= 0.93 ? 'mlf-ok' : 'mlf-poor';
}

// Build MLF load lookup: substation name → mlf record
function buildMlfLoadLookup() {
  const lk = new Map();
  (allMlf || []).forEach(r => {
    if (r.type === 'Load') {
      const key = normSub(r.name || '');
      if (key && !lk.has(key)) lk.set(key, r);
    }
  });
  return lk;
}

// Build MLF gen lookup: project name → mlf record
function buildMlfGenLookup() {
  const lk = new Map();
  (allMlf || []).forEach(r => {
    if (r.type === 'Gen') {
      const key = (r.name || '').toLowerCase().trim();
      if (key && !lk.has(key)) lk.set(key, r);
    }
  });
  return lk;
}

// ══════════════════════════════════════════════════════════════════════════════
//  BUILD NETWORK
// ══════════════════════════════════════════════════════════════════════════════
function buildNetwork(stateName, minKv = 132, regionId = null) {
  const stateLines = allLines.features.filter(f =>
    f.properties.state === stateName &&
    (f.properties.voltage_kv || 0) >= minKv
  );

  const subMap  = new Map();
  const edgeMap = new Map();
  const geoAcc  = new Map();

  function getSub(raw) {
    const id = normSub(raw);
    if (!id) return null;
    if (!subMap.has(id)) {
      subMap.set(id, {
        id, label: id,
        voltages: new Set(),
        conCount: new Map(),
        conEdges: new Map(),   // kv -> [edgeId]
        xfmrCount: 0,
        generators: [],
        mlfLoad: null,
        geo: null, x: 0, y: 0,
      });
    }
    return subMap.get(id);
  }

  function accGeo(id, lng, lat) {
    if (!geoAcc.has(id)) geoAcc.set(id, {lng:0,lat:0,n:0});
    const g = geoAcc.get(id); g.lng+=lng; g.lat+=lat; g.n++;
  }

  for (const f of stateLines) {
    const p  = f.properties;
    const kv = parseInt(p.voltage_kv) || 0;
    const eps = parseEps(p.name);
    if (!eps) continue;
    const [fr, to] = eps;
    const fSub = getSub(fr), tSub = getSub(to);
    if (!fSub || !tSub || fSub === tSub) continue;

    fSub.voltages.add(kv); tSub.voltages.add(kv);

    const coords = f.geometry.coordinates;
    accGeo(fSub.id, coords[0][0], coords[0][1]);
    accGeo(tSub.id, coords[coords.length-1][0], coords[coords.length-1][1]);

    const eKey = [...[fSub.id, tSub.id].sort(), kv].join('\x01');
    if (!edgeMap.has(eKey)) {
      edgeMap.set(eKey, {
        id: eKey, from: fSub.id, to: tSub.id, voltage: kv,
        circuits: 0, name: p.name,
        normRating: p.psse_norm_min_mva || null,
        emergRating: p.psse_emerg_min_mva || null,
        lengthM: p.length_m || null,
      });
    }
    const edge = edgeMap.get(eKey);
    edge.circuits++;
    // Keep best (max) ratings across parallel circuits
    if (p.psse_norm_min_mva)  edge.normRating  = Math.max(edge.normRating  || 0, p.psse_norm_min_mva);
    if (p.psse_emerg_min_mva) edge.emergRating = Math.max(edge.emergRating || 0, p.psse_emerg_min_mva);
  }

  // Add 66kV buses to terminal stations already in the 132kV+ network (bus only, no edges)
  const lines66 = allLines.features.filter(f =>
    f.properties.state === stateName && (f.properties.voltage_kv || 0) === 66
  );
  for (const f of lines66) {
    const eps = parseEps(f.properties.name);
    if (!eps) continue;
    for (const ep of eps) {
      const id = normSub(ep);
      if (id && subMap.has(id)) subMap.get(id).voltages.add(66);
    }
  }

  // Set average geo, sort voltages, build conCount
  const edges = [...edgeMap.values()];
  for (const [id, g] of geoAcc) {
    const sub = subMap.get(id);
    if (sub) sub.geo = { lng: g.lng/g.n, lat: g.lat/g.n };
  }
  for (const sub of subMap.values()) {
    sub.voltages = [...sub.voltages].sort((a,b) => b-a);
    for (const e of edges) {
      if (e.from === sub.id || e.to === sub.id) {
        sub.conCount.set(e.voltage, (sub.conCount.get(e.voltage)||0) + 1);
        if (!sub.conEdges.has(e.voltage)) sub.conEdges.set(e.voltage, []);
        sub.conEdges.get(e.voltage).push(e);
      }
    }
  }

  // Enrich with xfmr_count
  for (const sub of subMap.values()) {
    const match = allSubs.features.find(s =>
      normSub(s.properties.name) === sub.id &&
      (s.properties.state === stateName || !s.properties.state)
    );
    if (match?.properties?.xfmr_count > 0) sub.xfmrCount = match.properties.xfmr_count;
    else if (sub.voltages.length > 1)       sub.xfmrCount = 2;
  }

  // Enrich with MLF load
  const mlfLoadLookup = buildMlfLoadLookup();
  for (const sub of subMap.values()) {
    sub.mlfLoad = mlfLoadLookup.get(sub.id) || null;
  }

  // Match generators (Operating + Construction) to nearest substation ≤ 0.7°
  const mlfGenLookup = buildMlfGenLookup();
  const stateProj = allProjects.features.filter(f =>
    f.properties.state === stateName &&
    ['Operating', 'Construction'].includes(f.properties.dev_status)
  );
  for (const proj of stateProj) {
    const [pLng, pLat] = proj.geometry.coordinates;
    let best = null, bestD = 0.7;
    for (const sub of subMap.values()) {
      if (!sub.geo) continue;
      const d = Math.hypot(pLng - sub.geo.lng, pLat - sub.geo.lat);
      if (d < bestD) { bestD = d; best = sub; }
    }
    if (best) {
      const p = proj.properties;
      const mlfRec = mlfGenLookup.get((p.name||'').toLowerCase().trim()) || null;
      best.generators.push({
        label: p.name, tech: techCode(p.energy_source),
        mw: Math.round(p.capacity_mw || 0),
        status: p.dev_status, es: p.energy_source || '–',
        company: p.company || p.developer || null,
        mlfGen: mlfRec?.mlf_2026_27 || null,
        mlfImp: mlfRec?.mlf_import_2026_27 || null,
        mlfExp: mlfRec?.mlf_export_2026_27 || null,
      });
    }
  }

  // ── Metro region handling ─────────────────────────────────────────────────
  const metros = getMetroRegions(stateName);

  if (regionId !== null) {
    // METRO SUB-VIEW: only keep substations inside the specified metro region
    const region = metros.find(m => m.id === regionId);
    if (region) {
      for (const id of [...subMap.keys()])
        if (!inMetroRegion(subMap.get(id).geo, region)) subMap.delete(id);
      for (let i = edges.length - 1; i >= 0; i--) {
        const e = edges[i];
        if (!subMap.has(e.from) || !subMap.has(e.to)) edges.splice(i, 1);
      }
    }
  } else {
    // FULL STATE VIEW: collapse each metro region to a single box node
    for (const region of metros) {
      const metroSubIds = new Set();
      for (const [id, sub] of subMap)
        if (inMetroRegion(sub.geo, region)) metroSubIds.add(id);
      if (metroSubIds.size === 0) continue;

      // Centroid of metro substations with known geo
      let gLng = 0, gLat = 0, gN = 0;
      for (const id of metroSubIds) {
        const g = subMap.get(id).geo;
        if (g) { gLng += g.lng; gLat += g.lat; gN++; }
      }

      const metroSub = {
        id: region.id,
        label: region.label,
        voltages: [],          // filled below
        generators: [],
        conCount: new Map(),
        conEdges: new Map(),
        xfmrCount: 0,
        geo: gN ? { lng: gLng/gN, lat: gLat/gN } : { lng:(region.lngMin+region.lngMax)/2, lat:(region.latMin+region.latMax)/2 },
        isMetroBox: true,
        metroRegion: region,
        metroSubCount: metroSubIds.size,
      };

      const metroVoltages = new Set();
      for (let i = edges.length - 1; i >= 0; i--) {
        const e = edges[i];
        const fIn = metroSubIds.has(e.from), tIn = metroSubIds.has(e.to);
        if (fIn && tIn) { edges.splice(i, 1); continue; }
        if (fIn) { e.from = region.id; metroVoltages.add(e.voltage); }
        if (tIn) { e.to   = region.id; metroVoltages.add(e.voltage); }
      }
      metroSub.voltages = [...metroVoltages].sort((a,b) => b-a);
      // Give it enough width for the connecting edges
      metroSub.voltages.forEach(kv => metroSub.conCount.set(kv, 1));

      for (const id of metroSubIds) subMap.delete(id);
      subMap.set(region.id, metroSub);
    }
  }

  return { substations: subMap, edges };
}

// ══════════════════════════════════════════════════════════════════════════════
//  LAYOUT — geographic init on large canvas + D3 force (forceX/Y anchor)
// ══════════════════════════════════════════════════════════════════════════════
// Half-width of horizontal bus bar — also spans generator symbols if this is the lowest-kV bar
function busHalfW(sub, kv) {
  const lineHW = Math.max(BUS_MIN_HW, (sub.conCount.get(kv) || 1) * SLOT_W + BUS_PAD);
  if (kv === sub.voltages[sub.voltages.length - 1] && sub.generators.length > 0) {
    const genHW = Math.ceil((sub.generators.length - 1) * GEN_STEP / 2) + GEN_R + BUS_PAD;
    return Math.max(lineHW, genHW);
  }
  return lineHW;
}
// Half-height of vertical bus bar (V-oriented substations)
function busHalfH(sub, kv) {
  const lineHH = Math.max(BUS_MIN_HW, (sub.conCount.get(kv) || 1) * SLOT_W + BUS_PAD);
  if (kv === sub.voltages[sub.voltages.length - 1] && sub.generators.length > 0) {
    const genHH = Math.ceil((sub.generators.length - 1) * GEN_STEP / 2) + GEN_R + BUS_PAD;
    return Math.max(lineHH, genHH);
  }
  return lineHH;
}
// Y offset of voltage level in H-oriented substation (highest kV at top)
function busRelY(sub, kv) {
  const i = sub.voltages.indexOf(kv);
  return (i >= 0 ? i : 0) * BUS_SPACING;
}
// X offset of voltage level in V-oriented substation (highest kV at left)
function busRelX(sub, kv) {
  const i = sub.voltages.indexOf(kv);
  return (i >= 0 ? i : 0) * BUS_SPACING;
}
function colRadius(sub) {
  if (!sub) return 110;
  if (sub.isMetroBox) return 140;   // metro box is a fixed-size rectangle
  const maxHW = Math.max(BUS_MIN_HW, ...sub.voltages.map(kv => busHalfW(sub, kv)));
  const h = (sub.voltages.length - 1) * BUS_SPACING + (sub.generators.length > 0 ? GEN_R*2+40 : 20);
  return Math.hypot(maxHW + 60, h / 2 + 40);
}

function layoutNetwork({ substations, edges }) {
  const n   = substations.size;
  const VW2 = Math.max(12000, Math.ceil(Math.sqrt(n) * 1100));
  const VH2 = Math.ceil(VW2 * 0.72);
  const PAD = 500;

  const subsArr = [...substations.values()].filter(s => s.geo);
  if (!subsArr.length) return { vw: VW2, vh: VH2 };

  const lngs = subsArr.map(s => s.geo.lng);
  const lats = subsArr.map(s => s.geo.lat);
  const lngR = (Math.max(...lngs) - Math.min(...lngs)) || 1;
  const latR = (Math.max(...lats) - Math.min(...lats)) || 1;
  const minLng = Math.min(...lngs), minLat = Math.min(...lats);

  for (const sub of subsArr) {
    sub.x = PAD + (sub.geo.lng - minLng) / lngR * (VW2 - 2*PAD);
    sub.y = PAD + (1 - (sub.geo.lat - minLat) / latR) * (VH2 - 2*PAD);
  }

  // Force: geographic anchor + strong repulsion + large collision avoidance
  const nodes = subsArr.map(s => ({ id: s.id, x: s.x, y: s.y, gx: s.x, gy: s.y }));
  const links = edges
    .filter(e => substations.has(e.from) && substations.has(e.to))
    .map(e => ({ source: e.from, target: e.to }));

  const sim = d3.forceSimulation(nodes)
    .force('link',    d3.forceLink(links).id(d => d.id).distance(750).strength(0.02))
    .force('charge',  d3.forceManyBody().strength(-25000))
    .force('cx',      d3.forceX(d => d.gx).strength(0.09))
    .force('cy',      d3.forceY(d => d.gy).strength(0.09))
    // clearZone: the actual sub radius + the EXIT_PAD clearance + extra breathing room
    // so lines routed through that area belong to this sub only
    .force('collide', d3.forceCollide().radius(d => colRadius(substations.get(d.id)) + EXIT_PAD + 130).iterations(14))
    .stop();

  for (let i = 0; i < SIM_TICKS; i++) sim.tick();

  for (const node of nodes) {
    const sub = substations.get(node.id);
    if (sub) { sub.x = node.x; sub.y = node.y; }
  }

  // Assign bus bar orientation: metro boxes always H; others V if connections predominantly horizontal
  for (const sub of substations.values()) {
    if (sub.isMetroBox) { sub.orient = 'H'; continue; }
    let sumDx = 0, sumDy = 0, cnt = 0;
    for (const e of edges) {
      const nbId = e.from === sub.id ? e.to : e.to === sub.id ? e.from : null;
      if (!nbId) continue;
      const nb = substations.get(nbId);
      if (!nb) continue;
      sumDx += Math.abs(nb.x - sub.x);
      sumDy += Math.abs(nb.y - sub.y);
      cnt++;
    }
    sub.orient = (cnt > 0 && sumDx > sumDy * 1.4) ? 'V' : 'H';
  }

  return { vw: VW2, vh: VH2 };
}

// ══════════════════════════════════════════════════════════════════════════════
//  CONNECTION OFFSETS — spread stubs along bus bar in angular order
//  H-sub: offset spreads along X (xOff); V-sub: offset spreads along Y (yOff)
// ══════════════════════════════════════════════════════════════════════════════
function computeConOffsets({ substations, edges }) {
  const busCons = new Map();
  for (const e of edges) {
    for (const [myId, othId] of [[e.from, e.to], [e.to, e.from]]) {
      const k = `${myId}|${e.voltage}`;
      if (!busCons.has(k)) busCons.set(k, []);
      busCons.get(k).push({ e, othId });
    }
  }

  const conOff = new Map(); // `${e.id}|${subId}` → { xOff, yOff }
  for (const [k, cons] of busCons) {
    const [subId, kvStr] = k.split('|');
    const kv  = parseInt(kvStr);
    const sub = substations.get(subId);
    if (!sub || !cons.length || sub.isMetroBox) continue;

    cons.sort((a, b) => {
      const as = substations.get(a.othId), bs = substations.get(b.othId);
      if (!as || !bs) return 0;
      return Math.atan2(as.y - sub.y, as.x - sub.x) -
             Math.atan2(bs.y - sub.y, bs.x - sub.x);
    });

    if (sub.orient === 'V') {
      const hh = busHalfH(sub, kv);
      const n  = cons.length;
      cons.forEach(({ e }, i) => {
        const yo = n === 1 ? 0 : -hh + BUS_PAD + (2*(hh - BUS_PAD) / (n > 1 ? n-1 : 1)) * i;
        // bridgeOff spreads the exit level so parallel lines from the same bus don't overlap
        const bridgeOff = (n > 1 ? (i - (n-1)/2) * BRIDGE_SPREAD : 0);
        conOff.set(`${e.id}|${subId}`, { xOff: 0, yOff: yo, bridgeOff });
      });
    } else {
      const hw = busHalfW(sub, kv);
      const n  = cons.length;
      cons.forEach(({ e }, i) => {
        const xo = n === 1 ? 0 : -hw + BUS_PAD + (2*(hw - BUS_PAD) / (n > 1 ? n-1 : 1)) * i;
        const bridgeOff = (n > 1 ? (i - (n-1)/2) * BRIDGE_SPREAD : 0);
        conOff.set(`${e.id}|${subId}`, { xOff: xo, yOff: 0, bridgeOff });
      });
    }
  }
  return conOff;
}

// ══════════════════════════════════════════════════════════════════════════════
//  EDGE GEOMETRY — 5-segment perpendicular routing
//
//  Every line exits its bus bar PERPENDICULAR to it, clears the sub bounds,
//  then uses an elbow at the horizontal/vertical midpoint to reach the target,
//  where it again approaches PERPENDICULAR to the target bus bar.
//
//  H-oriented sub (horizontal bus bars):
//    top bus    → exits UPWARD   (VHV stub)
//    bottom bus → exits DOWNWARD (VHV stub)
//    middle bus → exits SIDEWAYS (HVH stub, avoids crossing siblings)
//
//  V-oriented sub (vertical bus bars):
//    left bus   → exits LEFT     (HVH stub)
//    right bus  → exits RIGHT    (HVH stub)
//    middle bus → exits UP/DOWN  (VHV stub)
//
//  Path shapes for the 4 source×target mode combinations:
//    VHV + VHV:  sx,sy → sx,eSrc → midX,eSrc → midX,eTgt → tx,eTgt → tx,ty
//    HVH + HVH:  sx,sy → eSrc,sy → eSrc,midY → eTgt,midY → eTgt,ty → tx,ty
//    VHV + HVH:  sx,sy → sx,eSrc → eTgt,eSrc → eTgt,ty   → tx,ty
//    HVH + VHV:  sx,sy → eSrc,sy → eSrc,eTgt → tx,eTgt   → tx,ty
//
//  bridgeOff in conOff spreads each connection to a unique bridge level so
//  parallel edges from the same bus bar never lie on top of each other.
// ══════════════════════════════════════════════════════════════════════════════
const EXIT_PAD    = 130;  // clearance zone outside sub — no other lines enter this zone
const BRIDGE_SPREAD = 28; // spread between parallel bridge levels from same bus bar

// exitGeom: connection point on bus bar + perpendicular exit level.
// Returns { x, y, mode:'VHV'|'HVH', exitVal }
function exitGeom(sub, kv, off, neighborX, neighborY) {
  const bo = (off.bridgeOff || 0);

  if (sub.isMetroBox) {
    const side = neighborX >= sub.x ? 1 : -1;
    return { x: sub.x, y: sub.y, mode: 'HVH', exitVal: sub.x + side * (90 + EXIT_PAD) };
  }

  const i = sub.voltages.indexOf(kv);
  const n = sub.voltages.length;

  if (sub.orient !== 'V') {
    // H-oriented: horizontal bus bars stacked top→bottom
    const cx   = sub.x + off.xOff;
    const cy   = sub.y + i * BUS_SPACING;
    const span = (n - 1) * BUS_SPACING;

    if (i === 0) {
      // Top bus: exit perpendicular upward.  bridgeOff < 0 → further above.
      return { x: cx, y: cy, mode: 'VHV', exitVal: sub.y - EXIT_PAD + bo };
    } else if (i === n - 1) {
      // Bottom bus: exit perpendicular downward.
      return { x: cx, y: cy, mode: 'VHV', exitVal: sub.y + span + EXIT_PAD + bo };
    } else {
      // Middle bus: exit sideways to avoid crossing sibling bus bars.
      const maxHW = Math.max(BUS_MIN_HW, ...sub.voltages.map(k => busHalfW(sub, k)));
      const side  = neighborX >= sub.x ? 1 : -1;
      return { x: cx, y: cy, mode: 'HVH', exitVal: sub.x + side * (maxHW + EXIT_PAD) + off.xOff };
    }
  } else {
    // V-oriented: vertical bus bars arranged left→right
    const cx   = sub.x + i * BUS_SPACING;
    const cy   = sub.y + off.yOff;
    const span = (n - 1) * BUS_SPACING;

    if (i === 0) {
      // Leftmost bus: exit perpendicular leftward.
      return { x: cx, y: cy, mode: 'HVH', exitVal: sub.x - EXIT_PAD + bo };
    } else if (i === n - 1) {
      // Rightmost bus: exit perpendicular rightward.
      return { x: cx, y: cy, mode: 'HVH', exitVal: sub.x + span + EXIT_PAD + bo };
    } else {
      // Middle bus: exit vertically.
      const maxHH = Math.max(BUS_MIN_HW, ...sub.voltages.map(k => busHalfH(sub, k)));
      const side  = neighborY >= sub.y ? 1 : -1;
      return { x: cx, y: cy, mode: 'VHV', exitVal: sub.y + side * (maxHH + EXIT_PAD) + bo };
    }
  }
}

function edgePts(e, conOff, substations) {
  const fs = substations.get(e.from), ts = substations.get(e.to);
  if (!fs || !ts) return null;
  const fo  = conOff.get(`${e.id}|${e.from}`) || { xOff: 0, yOff: 0, bridgeOff: 0 };
  const to_ = conOff.get(`${e.id}|${e.to}`)   || { xOff: 0, yOff: 0, bridgeOff: 0 };

  const srcG = exitGeom(fs, e.voltage, fo,  ts.x, ts.y);
  const tgtG = exitGeom(ts, e.voltage, to_, fs.x, fs.y);

  const sx = srcG.x, sy = srcG.y;
  const tx = tgtG.x, ty = tgtG.y;
  const eSrc = srcG.exitVal, eTgt = tgtG.exitVal;
  const srcMode = srcG.mode, tgtMode = tgtG.mode;
  const midX = (sx + tx) / 2;
  const midY = (sy + ty) / 2;

  return { sx, sy, tx, ty, eSrc, eTgt, srcMode, tgtMode, midX, midY };
}

// ══════════════════════════════════════════════════════════════════════════════
//  CROSSING GAPS  — gap in an H-segment where a V-segment of another edge crosses
//  Gap key: e.id + '|0'  → source H-bridge
//           e.id + '|1'  → target H-bridge (VHV+VHV and HVH+HVH only)
//           e.id + '|s'  → source H-stub  (HVH only)
//           e.id + '|t'  → target H-stub  (HVH only)
// ══════════════════════════════════════════════════════════════════════════════
function computeGapTs({ edges, substations }, conOff) {
  const geom = new Map();
  for (const e of edges) {
    const g = edgePts(e, conOff, substations);
    if (g) geom.set(e.id, g);
  }

  const gapTs = new Map();
  const EPS = 4;

  // Record a gap in edge eId's H-segment (key) at y=hy, x: x1→x2, where V-seg at xa spans ya→yb
  function addGap(eId, key, hy, x1, x2, xa, ya, yb) {
    const hLen = Math.abs(x2 - x1);
    if (hLen < 2*EPS) return;
    const hxa = Math.min(x1, x2), hxb = Math.max(x1, x2);
    const yLo = Math.min(ya, yb), yHi = Math.max(ya, yb);
    if (xa > hxa+EPS && xa < hxb-EPS && hy > yLo+EPS && hy < yHi-EPS) {
      const t = (xa - x1) / (x2 - x1);
      const k = eId + key;
      if (!gapTs.has(k)) gapTs.set(k, []);
      gapTs.get(k).push(t);
    }
  }

  // Return the H-segments and V-segments of a geometry record for gap testing
  function hSegs(g) {
    if (g.srcMode === 'VHV' && g.tgtMode === 'VHV')
      return [['|0', g.eSrc, g.sx, g.midX], ['|1', g.eTgt, g.midX, g.tx]];
    if (g.srcMode === 'HVH' && g.tgtMode === 'HVH')
      return [['|s', g.sy, g.sx, g.eSrc], ['|t', g.ty, g.eTgt, g.tx]];
    if (g.srcMode === 'VHV')  // VHV+HVH: one H-segment at eSrc
      return [['|0', g.eSrc, g.sx, g.eTgt]];
    return [['|t', g.ty, g.eTgt, g.tx]];   // HVH+VHV: one H-segment at ty
  }
  function vSegs(g) {
    if (g.srcMode === 'VHV' && g.tgtMode === 'VHV')
      return [[g.sx, g.sy, g.eSrc], [g.midX, g.eSrc, g.eTgt], [g.tx, g.eTgt, g.ty]];
    if (g.srcMode === 'HVH' && g.tgtMode === 'HVH')
      return [[g.eSrc, g.sy, g.midY], [g.eTgt, g.midY, g.ty]];
    if (g.srcMode === 'VHV')  // VHV+HVH
      return [[g.sx, g.sy, g.eSrc], [g.eTgt, g.eSrc, g.ty]];
    return [[g.eSrc, g.sy, g.eTgt], [g.tx, g.eTgt, g.ty]];  // HVH+VHV
  }

  for (let i = 0; i < edges.length; i++) {
    for (let j = i+1; j < edges.length; j++) {
      const eA = edges[i], eB = edges[j];
      if (eA.from===eB.from || eA.from===eB.to || eA.to===eB.from || eA.to===eB.to) continue;
      const gA = geom.get(eA.id), gB = geom.get(eB.id);
      if (!gA || !gB) continue;
      // Test A's H-segs vs B's V-segs and vice versa
      for (const [sfx, hy, x1, x2] of hSegs(gA))
        for (const [vx, vya, vyb] of vSegs(gB))
          addGap(eA.id, sfx, hy, x1, x2, vx, vya, vyb);
      for (const [sfx, hy, x1, x2] of hSegs(gB))
        for (const [vx, vya, vyb] of vSegs(gA))
          addGap(eB.id, sfx, hy, x1, x2, vx, vya, vyb);
    }
  }

  return { gapTs, geom };
}

// ══════════════════════════════════════════════════════════════════════════════
//  ORTHOGONAL PATH BUILDER
//  offset: double-circuit stub separation (shifts stubs ±offset in the
//          perpendicular direction so both paths stay distinct end-to-end)
//  gaps0/gaps1: crossing-gap t-values for the first/second H-segment
// ══════════════════════════════════════════════════════════════════════════════
function buildOrthPath(g, gaps0, offset, gaps1) {
  const off = offset || 0;

  function gappedH(x1, x2, y, gaps) {
    const hw = Math.abs(x2 - x1);
    const dT = hw > 0 ? GAP_PX / hw : 0;
    const sorted = (gaps || []).slice().sort((a,b) => a-b);
    const merged = [];
    for (const t of sorted) {
      const lo = Math.max(0.001, t-dT), hi = Math.min(0.999, t+dT);
      if (merged.length && lo < merged[merged.length-1][1] + dT)
        merged[merged.length-1][1] = Math.max(merged[merged.length-1][1], hi);
      else merged.push([lo, hi]);
    }
    let d = '';
    for (const [lo, hi] of merged)
      d += ` L${(x1+lo*(x2-x1)).toFixed(1)},${y.toFixed(1)} M${(x1+hi*(x2-x1)).toFixed(1)},${y.toFixed(1)}`;
    d += ` L${x2.toFixed(1)},${y.toFixed(1)}`;
    return d;
  }

  const { sx, sy, tx, ty, eSrc, eTgt, srcMode, tgtMode, midX, midY } = g;

  if (srcMode === 'VHV' && tgtMode === 'VHV') {
    // Both stubs vertical.  offset shifts stub X so double circuits stay separate.
    const sxo = sx + off, txo = tx + off;
    let d = `M${sxo.toFixed(1)},${sy.toFixed(1)} L${sxo.toFixed(1)},${eSrc.toFixed(1)}`;
    d += gappedH(sxo, midX + off, eSrc, gaps0);
    d += ` L${(midX+off).toFixed(1)},${eTgt.toFixed(1)}`;
    d += gappedH(midX + off, txo, eTgt, gaps1);
    d += ` L${txo.toFixed(1)},${ty.toFixed(1)}`;
    return d;

  } else if (srcMode === 'HVH' && tgtMode === 'HVH') {
    // Both stubs horizontal.  offset shifts stub Y.
    const syo = sy + off, tyo = ty + off;
    let d = `M${sx.toFixed(1)},${syo.toFixed(1)}`;
    d += gappedH(sx, eSrc, syo, gaps0);         // source H-stub (treated as gapped H for consistency)
    d += ` L${eSrc.toFixed(1)},${(midY+off).toFixed(1)} L${eTgt.toFixed(1)},${(midY+off).toFixed(1)} L${eTgt.toFixed(1)},${tyo.toFixed(1)}`;
    d += gappedH(eTgt, tx, tyo, gaps1);
    return d;

  } else if (srcMode === 'VHV') {
    // VHV source, HVH target: single elbow
    const sxo = sx + off;
    return `M${sxo.toFixed(1)},${sy.toFixed(1)} L${sxo.toFixed(1)},${eSrc.toFixed(1)} L${eTgt.toFixed(1)},${eSrc.toFixed(1)} L${eTgt.toFixed(1)},${ty.toFixed(1)} L${tx.toFixed(1)},${ty.toFixed(1)}`;

  } else {
    // HVH source, VHV target: single elbow
    const syo = sy + off;
    return `M${sx.toFixed(1)},${syo.toFixed(1)} L${eSrc.toFixed(1)},${syo.toFixed(1)} L${eSrc.toFixed(1)},${eTgt.toFixed(1)} L${tx.toFixed(1)},${eTgt.toFixed(1)} L${tx.toFixed(1)},${ty.toFixed(1)}`;
  }
}

// ══════════════════════════════════════════════════════════════════════════════
//  POPUP BUILDERS
// ══════════════════════════════════════════════════════════════════════════════
function popupSubstation(sub, stateName) {
  let h = `<div class="popup-title">${sub.label}</div>`;
  h += `<div class="popup-grid">`;
  h += `<span class="popup-label">State</span><span class="popup-value">${stateName}</span>`;
  h += `<span class="popup-label">Voltages</span><span class="popup-value">${sub.voltages.join(' / ')} kV</span>`;
  if (sub.xfmrCount > 0)
    h += `<span class="popup-label">Transformers</span><span class="popup-value">${sub.xfmrCount}</span>`;
  h += `</div>`;

  // Connections per voltage
  if (sub.voltages.length > 0) {
    h += `<div class="popup-section"><div class="popup-section-title">Connected Lines</div>`;
    for (const kv of sub.voltages) {
      const elist = (sub.conEdges.get(kv) || []);
      const others = elist.map(e => (e.from === sub.id ? e.to : e.from) + (e.circuits > 1 ? ` ×${e.circuits}` : '')).join(', ');
      h += `<div style="font-size:11px;margin-bottom:3px"><span style="color:${VC[kv]||'#888'};font-weight:700">${kv}kV</span>: ${others || '–'}</div>`;
    }
    h += `</div>`;
  }

  // MLF load
  if (sub.mlfLoad) {
    const m = sub.mlfLoad;
    h += `<div class="popup-section"><div class="popup-section-title">MLF Load 2026–27</div>`;
    h += `<div class="popup-grid">`;
    if (m.mlf_2026_27) h += `<span class="popup-label">Load MLF</span><span class="popup-value ${mlfClass(m.mlf_2026_27)}">${(+m.mlf_2026_27).toFixed(4)}</span>`;
    if (m.tni)         h += `<span class="popup-label">TNI</span><span class="popup-value">${m.tni}</span>`;
    h += `</div></div>`;
  }

  return h;
}

function popupLine(edge, stateName) {
  let h = `<div class="popup-title">${edge.name || 'Transmission Line'}</div>`;
  h += `<div class="popup-grid">`;
  h += `<span class="popup-label">Voltage</span><span class="popup-value">${edge.voltage} kV</span>`;
  h += `<span class="popup-label">Circuits</span><span class="popup-value">${edge.circuits}</span>`;
  h += `<span class="popup-label">State</span><span class="popup-value">${stateName}</span>`;
  h += `<span class="popup-label">From</span><span class="popup-value">${edge.from}</span>`;
  h += `<span class="popup-label">To</span><span class="popup-value">${edge.to}</span>`;
  if (edge.lengthM)
    h += `<span class="popup-label">Length</span><span class="popup-value">${(edge.lengthM/1000).toFixed(1)} km</span>`;
  h += `</div>`;
  if (edge.normRating || edge.emergRating) {
    h += `<div class="popup-section"><div class="popup-section-title">Ratings (PSSE)</div>`;
    h += `<div class="popup-grid">`;
    if (edge.normRating)  h += `<span class="popup-label">Normal (N)</span><span class="popup-value">${Math.round(edge.normRating)} MVA</span>`;
    if (edge.emergRating) h += `<span class="popup-label">Emergency</span><span class="popup-value">${Math.round(edge.emergRating)} MVA</span>`;
    h += `</div></div>`;
  }
  return h;
}

function popupGenerator(gen) {
  const col = gen.status === 'Operating' ? '#3fb950' : '#d29922';
  let h = `<div class="popup-title">${gen.label}</div>`;
  h += `<div class="popup-grid">`;
  h += `<span class="popup-label">Status</span><span class="popup-value" style="color:${col}">${gen.status}</span>`;
  h += `<span class="popup-label">Technology</span><span class="popup-value">${gen.es}</span>`;
  if (gen.mw > 0)
    h += `<span class="popup-label">Capacity</span><span class="popup-value">${gen.mw.toLocaleString()} MW</span>`;
  if (gen.company)
    h += `<span class="popup-label">Developer</span><span class="popup-value">${gen.company}</span>`;
  h += `</div>`;

  const hasDual = gen.mlfImp != null && gen.mlfExp != null;
  if (gen.mlfGen != null || hasDual) {
    h += `<div class="popup-section"><div class="popup-section-title">MLF Gen 2026–27</div>`;
    if (hasDual) {
      h += `<div class="popup-grid">`;
      h += `<span class="popup-label">Export</span><span class="popup-value ${mlfClass(gen.mlfExp)}">${(+gen.mlfExp).toFixed(4)}</span>`;
      h += `<span class="popup-label">Import</span><span class="popup-value ${mlfClass(gen.mlfImp)}">${(+gen.mlfImp).toFixed(4)}</span>`;

      h += `<div class="popup-grid"><span class="popup-label">MLF</span><span class="popup-value ${mlfClass(gen.mlfGen)}">${(+gen.mlfGen).toFixed(4)}</span></div>`;

    h += `</div>`;

  return h;
}

function popupTransformer(sub, fromKv, toKv) {
  let h = `<div class="popup-title">Transformer</div>`;
  h += `<div class="popup-grid">`;
  h += `<span class="popup-label">Substation</span><span class="popup-value">${sub.label}</span>`;
  h += `<span class="popup-label">Primary</span><span class="popup-value" style="color:${VC[fromKv]||'#888'}">${fromKv} kV</span>`;
  h += `<span class="popup-label">Secondary</span><span class="popup-value" style="color:${VC[toKv]||'#888'}">${toKv} kV</span>`;
  h += `<span class="popup-label">Count</span><span class="popup-value">${sub.xfmrCount}</span>`;
  h += `</div>`;
  return h;
}

// ══════════════════════════════════════════════════════════════════════════════
//  DRAW
// ══════════════════════════════════════════════════════════════════════════════
function drawSLD({ substations, edges }, conOff, gapTs, geom, stateName) {
  root.selectAll('*').remove();

  const edgeG = root.append('g').attr('class', 'edges');
  const subG  = root.append('g').attr('class', 'substations');

  // ── Edges ─────────────────────────────────────────────────────────────────
  for (const e of edges) {
    const fs = substations.get(e.from), ts = substations.get(e.to);
    if (!fs || !ts) continue;

    const g    = geom.get(e.id);
    if (!g) continue;
    const col   = VC[e.voltage] || '#8b5e3c';
    const lw    = VW[e.voltage] || 2;
    // Load crossing-gap t-values for the two H-segments of this edge
    const gaps0 = gapTs.get(e.id+'|0') || gapTs.get(e.id+'|s') || [];
    const gaps1 = gapTs.get(e.id+'|1') || gapTs.get(e.id+'|t') || [];

    const eg = edgeG.append('g');

    if (e.circuits >= 2) {
      const off = 4;
      eg.append('path').attr('d', buildOrthPath(g, gaps0, -off, gaps1))
        .attr('stroke', col).attr('stroke-width', lw).attr('fill', 'none').attr('opacity', 0.88);
      eg.append('path').attr('d', buildOrthPath(g, gaps0, +off, gaps1))
        .attr('stroke', col).attr('stroke-width', lw).attr('fill', 'none').attr('opacity', 0.88);
      if (e.circuits > 2) {
        // Tick marks at the midpoint elbow
        const bx = g.srcMode === 'HVH' ? g.eSrc : g.midX;
        const by = g.srcMode === 'HVH' ? g.midY  : g.eSrc;
        for (let k = -1; k <= 1; k++) {
          eg.append('line')
            .attr('x1',bx+k*6).attr('y1',by-8)
            .attr('x2',bx+k*6).attr('y2',by+8)
            .attr('stroke',col).attr('stroke-width',1.5).attr('opacity',0.7);
        }
      }
    } else {
      eg.append('path').attr('d', buildOrthPath(g, gaps0, 0, gaps1))
        .attr('stroke', col).attr('stroke-width', lw).attr('fill', 'none').attr('opacity', 0.88);
    }

    // Wide invisible hit area
    eg.append('path').attr('class','edge-hit')
      .attr('d', buildOrthPath(g, null, 0, null))
      .attr('stroke','transparent').attr('stroke-width', Math.max(lw+10, 16))
      .attr('fill','none')
      .on('click', function(ev) {
        ev.stopPropagation();
        showPopup(popupLine(e, stateName), g.midX, g.midY);
      });
  }

  // ── Substations ───────────────────────────────────────────────────────────
  for (const sub of substations.values()) {
    const sg = subG.append('g')
      .attr('class','sub-group')
      .attr('transform', `translate(${sub.x},${sub.y})`);

    // ── METRO BOX ────────────────────────────────────────────────────────────
    if (sub.isMetroBox) {
      const bw = 180, bh = 80 + sub.voltages.length * 18;
      sg.append('rect')
        .attr('x', -bw/2).attr('y', -bh/2)
        .attr('width', bw).attr('height', bh)
        .attr('rx', 8).attr('ry', 8)
        .attr('fill', '#e8f4fd').attr('stroke', '#4496e0')
        .attr('stroke-width', 2).attr('stroke-dasharray', '8,4');
      sg.append('text')
        .attr('x', 0).attr('y', -bh/2 + 18)
        .attr('text-anchor', 'middle')
        .attr('font-size', 11).attr('font-weight', 'bold').attr('fill', '#1a3a5c')
        .text(sub.label);
      sg.append('text')
        .attr('x', 0).attr('y', -bh/2 + 32)
        .attr('text-anchor', 'middle')
        .attr('font-size', 9).attr('fill', '#555')
        .text(`${sub.metroSubCount} substations`);
      // Voltage swatches
      sub.voltages.forEach((kv, i) => {
        const ky = -bh/2 + 50 + i * 18;
        sg.append('rect')
          .attr('x', -50).attr('y', ky - 6)
          .attr('width', 100).attr('height', 12).attr('rx', 3)
          .attr('fill', VC[kv] || '#8b5e3c').attr('opacity', 0.18);
        sg.append('text')
          .attr('x', 0).attr('y', ky + 4)
          .attr('text-anchor', 'middle')
          .attr('font-size', 9).attr('font-weight', '600').attr('fill', VC[kv] || '#8b5e3c')
          .text(`${kv} kV`);
      });
      sg.append('text')
        .attr('x', 0).attr('y', bh/2 - 8)
        .attr('text-anchor', 'middle')
        .attr('font-size', 8).attr('fill', '#4496e0').attr('font-style', 'italic')
        .text('⤢ double-click to expand');
      // Interactions
      sg.style('cursor', 'pointer')
        .on('dblclick', function(ev) {
          ev.stopPropagation();
          renderState(stateName, sub.metroRegion.id);
        })
        .on('click', function(ev) {
          ev.stopPropagation();
          showPopup(
            `<div class="popup-title">${sub.label}</div>
             <div class="popup-grid">
               <span class="popup-label">Substations</span><span class="popup-value">${sub.metroSubCount}</span>
               <span class="popup-label">Voltages</span><span class="popup-value">${sub.voltages.join(' / ')} kV</span>
             </div>
             <div style="margin-top:10px;font-size:11px;color:#8b949e">Double-click to open metro diagram</div>`,
            sub.x, sub.y);
        });
      continue;   // skip normal substation rendering
    }

    const volts = sub.voltages;

    if (sub.orient === 'V') {
      // ── V-ORIENTED: vertical bus bars arranged left→right by decreasing kV ──
      const maxHH  = Math.max(BUS_MIN_HW, ...volts.map(kv => busHalfH(sub, kv)));
      const totalW = (volts.length - 1) * BUS_SPACING;
      const genBelow = sub.generators.length > 0;
      const genExtraW = genBelow ? GEN_R * 2 + 30 : 0;

      // Opaque background — masks any transit lines that pass through this sub's footprint
      sg.append('rect')
        .attr('x', -12).attr('y', -maxHH - 8)
        .attr('width', totalW + 24 + genExtraW)
        .attr('height', (maxHH + 8) * 2)
        .attr('fill', 'rgba(250,250,248,0.97)').attr('stroke', 'none')
        .attr('pointer-events', 'none');
      sg.append('rect')
        .attr('x', -12).attr('y', -maxHH - 8)
        .attr('width', totalW + 24 + genExtraW)
        .attr('height', (maxHH + 8) * 2)
        .attr('fill','transparent').attr('stroke','none')
        .on('click', function(ev) {
          ev.stopPropagation();
          showPopup(popupSubstation(sub, stateName), sub.x, sub.y);
        });

      for (let i = 0; i < volts.length; i++) {
        const kv  = volts[i];
        const bx  = i * BUS_SPACING;
        const hh  = busHalfH(sub, kv);
        const col = VC[kv] || '#8b5e3c';
        const bw  = VW[kv] || 2;
        sg.append('line')
          .attr('x1',bx).attr('x2',bx).attr('y1',-hh).attr('y2',hh)
          .attr('stroke',col).attr('stroke-width',bw+2).attr('stroke-linecap','square');
        sg.append('text')
          .attr('x',bx).attr('y',-hh - 4)
          .attr('text-anchor','middle')
          .attr('font-size',8).attr('font-weight','600').attr('fill',col)
          .text(`${kv}kV`);
      }

      sg.append('text')
        .attr('x', totalW / 2).attr('y', -maxHH - 16)
        .attr('text-anchor','middle')
        .attr('font-weight','bold').attr('font-size',10).attr('fill','#1a1a2e')
        .text(sub.label);

      // Transformer symbols — horizontal overlapping circles between adjacent vertical bus bars
      for (let i = 0; i < volts.length - 1; i++) {
        const x1  = i * BUS_SPACING;
        const x2  = (i + 1) * BUS_SPACING;
        const midX = (x1 + x2) / 2;
        const sep  = XFMR_R * 0.65;
        const nY   = Math.min(Math.max(sub.xfmrCount || 2, 1), 4);
        const totH = (nY - 1) * 24;

        for (let t = 0; t < nY; t++) {
          const cy  = -totH / 2 + t * 24;
          const lCX = midX - sep;
          const rCX = midX + sep;
          sg.append('line')
            .attr('x1',x1).attr('y1',cy).attr('x2',lCX - XFMR_R).attr('y2',cy)
            .attr('stroke','#2a2a3a').attr('stroke-width',1.5);
          sg.append('line')
            .attr('x1',x2).attr('y1',cy).attr('x2',rCX + XFMR_R).attr('y2',cy)
            .attr('stroke','#2a2a3a').attr('stroke-width',1.5);
          const xfGroup = sg.append('g').style('cursor','pointer')
            .on('click', (ev) => {
              ev.stopPropagation();
              showPopup(popupTransformer(sub, volts[i], volts[i+1]), sub.x + midX, sub.y + cy);
            });
          xfGroup.append('circle')
            .attr('cx',lCX).attr('cy',cy).attr('r',XFMR_R)
            .attr('stroke','#2a2a3a').attr('fill','rgba(250,250,248,1.0)').attr('stroke-width',1.5);
          xfGroup.append('circle')
            .attr('cx',rCX).attr('cy',cy).attr('r',XFMR_R)
            .attr('stroke','#2a2a3a').attr('fill','rgba(250,250,248,1.0)').attr('stroke-width',1.5);
        }
      }

      if (genBelow) {
        // V-oriented: generators attach to the rightmost (lowest-kV) bus bar,
        // stacked vertically to the right of it so they don't float.
        const rightBx = totalW;   // x of rightmost bus bar (relative to sub)
        const n       = sub.generators.length;
        const totH    = (n - 1) * GEN_STEP;
        sub.generators.forEach((gen, gi) => {
          const gy   = -totH / 2 + gi * GEN_STEP;
          const gx   = rightBx + GEN_R + 22;
          const gcol = gen.status === 'Operating' ? '#3fb950' : '#d29922';
          sg.append('line')
            .attr('x1',rightBx).attr('y1',gy).attr('x2',gx - GEN_R).attr('y2',gy)
            .attr('stroke','#777').attr('stroke-width',1);
          const gg = sg.append('g').attr('class','gen-sym')
            .on('click', (ev) => {
              ev.stopPropagation();
              showPopup(popupGenerator(gen), sub.x + gx, sub.y + gy);
            });
          gg.append('circle')
            .attr('cx',gx).attr('cy',gy).attr('r',GEN_R)
            .attr('fill',gcol).attr('opacity',0.9)
            .attr('stroke','rgba(250,250,248,0.8)').attr('stroke-width',1.2);
          gg.append('text')
            .attr('x',gx).attr('y',gy + 3.5)
            .attr('text-anchor','middle')
            .attr('font-size',6).attr('font-weight','bold').attr('fill','#fff')
            .text(gen.tech.slice(0,4));
        });
        const totalMW = sub.generators.reduce((s,g) => s + g.mw, 0);
        if (totalMW > 0) {
          const gxLabel = totalW + GEN_R + 22;
          const gyLabel = totH / 2 + GEN_R + 12;
          sg.append('text')
            .attr('x', gxLabel).attr('y', gyLabel)
            .attr('text-anchor','middle').attr('font-size',7).attr('fill','#555')
            .text(totalMW.toLocaleString() + 'MW');
        }
      }

    } else {
      // ── H-ORIENTED: horizontal bus bars stacked top→bottom by decreasing kV ──
      const maxHW  = Math.max(BUS_MIN_HW, ...volts.map(kv => busHalfW(sub, kv)));
      const totalH = (volts.length - 1) * BUS_SPACING + (sub.generators.length > 0 ? GEN_R*2 + 35 : 5);

      // Opaque background — masks any transit lines that pass through this sub's footprint
      sg.append('rect')
        .attr('x', -maxHW - 8).attr('y', -24)
        .attr('width', (maxHW + 8) * 2).attr('height', totalH + 32)
        .attr('fill', 'rgba(250,250,248,0.97)').attr('stroke', 'none')
        .attr('pointer-events', 'none');
      sg.append('rect')
        .attr('x', -maxHW - 8).attr('y', -24)
        .attr('width', (maxHW + 8) * 2).attr('height', totalH + 32)
        .attr('fill','transparent').attr('stroke','none')
        .on('click', function(ev) {
          ev.stopPropagation();
          showPopup(popupSubstation(sub, stateName), sub.x, sub.y);
        });

      for (let i = 0; i < volts.length; i++) {
        const kv  = volts[i];
        const by  = i * BUS_SPACING;
        const hw  = busHalfW(sub, kv);
        const col = VC[kv] || '#8b5e3c';
        const bw  = VW[kv] || 2;
        sg.append('line')
          .attr('x1',-hw).attr('x2',hw).attr('y1',by).attr('y2',by)
          .attr('stroke',col).attr('stroke-width',bw+2).attr('stroke-linecap','square');
        sg.append('text')
          .attr('x',hw + 7).attr('y',by + 4.5)
          .attr('font-size',8).attr('font-weight','600').attr('fill',col)
          .text(`${kv}kV`);
      }

      sg.append('text')
        .attr('x',0).attr('y',-16)
        .attr('text-anchor','middle')
        .attr('font-weight','bold').attr('font-size',10).attr('fill','#1a1a2e')
        .text(sub.label);

      for (let i = 0; i < volts.length - 1; i++) {
        const y1   = i * BUS_SPACING;
        const y2   = (i + 1) * BUS_SPACING;
        const nX   = Math.min(Math.max(sub.xfmrCount || 2, 1), 4);
        const totW = (nX - 1) * 24;
        for (let t = 0; t < nX; t++) {
          const cx   = -totW / 2 + t * 24;
          const midY  = (y1 + y2) / 2;
          const sep   = XFMR_R * 0.65;
          const topCY = midY - sep;
          const botCY = midY + sep;
          sg.append('line')
            .attr('x1',cx).attr('y1',y1).attr('x2',cx).attr('y2',topCY - XFMR_R)
            .attr('stroke','#2a2a3a').attr('stroke-width',1.5);
          sg.append('line')
            .attr('x1',cx).attr('y1',y2).attr('x2',cx).attr('y2',botCY + XFMR_R)
            .attr('stroke','#2a2a3a').attr('stroke-width',1.5);
          const xfGroup = sg.append('g').style('cursor','pointer')
            .on('click', (ev) => {
              ev.stopPropagation();
              showPopup(popupTransformer(sub, volts[i], volts[i+1]), sub.x + cx, sub.y + midY);
            });
          xfGroup.append('circle')
            .attr('cx',cx).attr('cy',topCY).attr('r',XFMR_R)
            .attr('stroke','#2a2a3a').attr('fill','rgba(250,250,248,1.0)').attr('stroke-width',1.5);
          xfGroup.append('circle')
            .attr('cx',cx).attr('cy',botCY).attr('r',XFMR_R)
            .attr('stroke','#2a2a3a').attr('fill','rgba(250,250,248,1.0)').attr('stroke-width',1.5);
        }
      }

      if (sub.generators.length > 0) {
        const lastY = (volts.length - 1) * BUS_SPACING;
        const genY  = lastY + GEN_R + 22;
        const n     = sub.generators.length;
        const totW  = (n - 1) * GEN_STEP;
        sub.generators.forEach((gen, gi) => {
          const gx   = -totW / 2 + gi * GEN_STEP;
          const gcol = gen.status === 'Operating' ? '#3fb950' : '#d29922';
          sg.append('line')
            .attr('x1',gx).attr('y1',lastY).attr('x2',gx).attr('y2',genY - GEN_R)
            .attr('stroke','#777').attr('stroke-width',1);
          const gg = sg.append('g').attr('class','gen-sym')
            .on('click', (ev) => {
              ev.stopPropagation();
              showPopup(popupGenerator(gen), sub.x + gx, sub.y + genY);
            });
          gg.append('circle')
            .attr('cx',gx).attr('cy',genY).attr('r',GEN_R)
            .attr('fill',gcol).attr('opacity',0.9)
            .attr('stroke','rgba(250,250,248,0.8)').attr('stroke-width',1.2);
          gg.append('text')
            .attr('x',gx).attr('y',genY + 3.5)
            .attr('text-anchor','middle')
            .attr('font-size',6).attr('font-weight','bold').attr('fill','#fff')
            .text(gen.tech.slice(0,4));
        });
        const totalMW = sub.generators.reduce((s,g) => s + g.mw, 0);
        if (totalMW > 0) {
          sg.append('text')
            .attr('x',0).attr('y', genY + GEN_R + 12)
            .attr('text-anchor','middle').attr('font-size',7).attr('fill','#555')
            .text(totalMW.toLocaleString() + 'MW');
        }
      }
    }
  }
}

// ══════════════════════════════════════════════════════════════════════════════
//  FIT VIEW
// ══════════════════════════════════════════════════════════════════════════════
function fitView({ substations }) {
  const subsArr = [...substations.values()];
  if (!subsArr.length) return;

  const xs = subsArr.map(s => s.x);
  const ys = subsArr.map(s => s.y);
  const x0=Math.min(...xs)-160, x1=Math.max(...xs)+160;
  const y0=Math.min(...ys)-50,  y1=Math.max(...ys)+80;
  const bw=x1-x0, bh=y1-y0;
  const vw=wrap.clientWidth, vh=wrap.clientHeight;
  const scale = Math.min(vw/bw, vh/bh) * 0.92;
  const tx = (vw - bw*scale)/2 - x0*scale;
  const ty = (vh - bh*scale)/2 - y0*scale;
  svg.call(zb.transform, d3.zoomIdentity.translate(tx,ty).scale(scale));
}

// ══════════════════════════════════════════════════════════════════════════════
//  MAIN
// ══════════════════════════════════════════════════════════════════════════════
function renderState(stateName, regionId = null) {
  if (!allLines) return;
  currentState  = stateName;
  currentRegion = regionId;
  hidePopup();

  // Update breadcrumb
  const bcEl     = document.getElementById('breadcrumb');
  const bcState  = document.getElementById('bc-state');
  const bcRegion = document.getElementById('bc-region');
  if (regionId !== null) {
    const region = getMetroRegions(stateName).find(m => m.id === regionId);
    bcState.textContent  = stateName;
    bcRegion.textContent = region ? region.label : regionId;
    bcEl.style.display   = 'inline-flex';
    bcState.onclick = () => renderState(stateName, null);
  } else {
    bcEl.style.display = 'none';
  }

  const loadEl = document.getElementById('loading');
  loadEl.textContent = regionId
    ? `Building ${stateName} metro SLD…`
    : `Building ${stateName} SLD…`;
  loadEl.style.display = 'block';

  setTimeout(() => {
    try {
      const net  = buildNetwork(stateName, 132, regionId);
      layoutNetwork(net);
      const conOff = computeConOffsets(net);
      const { gapTs, geom } = computeGapTs(net, conOff);
      drawSLD(net, conOff, gapTs, geom, stateName);
      fitView(net);
      loadEl.style.display = 'none';
    } catch(err) {
      loadEl.textContent = 'Error: ' + err.message;
      console.error(err);
    }
  }, 30);
}
</script>

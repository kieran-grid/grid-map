<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NEM SLD – GridXplore Oz</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0d1117; color: #1a1a2e;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── Header ── */
    #header {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 8px 14px;
      background: #161b22; border-bottom: 1px solid #30363d;
    }
    #header h1 { font-size: 14px; color: #58a6ff; white-space: nowrap; margin-right: 4px; }

    .state-btn {
      padding: 4px 13px; border: 1px solid #30363d; border-radius: 4px;
      background: #21262d; color: #e6edf3; cursor: pointer;
      font-size: 12px; font-weight: 600; letter-spacing: 0.3px;
    }
    .state-btn.active { background: #1f6feb; border-color: #58a6ff; color: #fff; }
    .state-btn:hover:not(.active) { background: #30363d; }

    .volt-legend { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-left: 6px; }
    .vl { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #8b949e; }
    .vl-line { border-radius: 1px; }

    #header a { font-size: 11px; color: #8b949e; text-decoration: none; margin-left: auto; }
    #header a:hover { color: #e6edf3; }

    /* ── Canvas ── */
    #sld-wrap { flex: 1; position: relative; overflow: hidden; }
    svg#sld { width: 100%; height: 100%; background: #fafaf8; display: block; }

    /* ── Loading overlay ── */
    #loading {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      background: rgba(250,250,248,0.95); border: 1px solid #ccc; border-radius: 6px;
      padding: 12px 20px; font-size: 14px; color: #555; z-index: 50;
    }

    /* ── Popup — same dark style as main map ── */
    #sld-popup {
      position: absolute;
      background: #161b22; color: #e6edf3;
      border: 1px solid #30363d; border-radius: 8px;
      padding: 14px 16px; max-width: 320px; min-width: 220px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      font-size: 13px; z-index: 100; display: none;
      pointer-events: auto;
    }
    .popup-close {
      position: absolute; top: 6px; right: 10px;
      color: #8b949e; font-size: 18px; cursor: pointer; line-height: 1;
    }
    .popup-close:hover { color: #e6edf3; }
    .popup-title { font-size: 14px; font-weight: 700; color: #58a6ff; margin-bottom: 10px; padding-right: 22px; line-height: 1.3; }
    .popup-grid { display: grid; grid-template-columns: auto 1fr; gap: 3px 10px; }
    .popup-label { color: #8b949e; font-size: 12px; white-space: nowrap; }
    .popup-value { color: #e6edf3; font-size: 12px; }
    .popup-section { margin-top: 10px; padding-top: 8px; border-top: 1px solid #30363d; }
    .popup-section-title { font-size: 11px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
    .project-item { padding: 3px 0; font-size: 12px; border-bottom: 1px solid #21262d; }
    .project-item:last-child { border: none; }
    .mlf-good { color: #3fb950; }
    .mlf-ok   { color: #d29922; }
    .mlf-poor { color: #f85149; }

    /* ── Cursor on interactive elements ── */
    .sub-group { cursor: pointer; }
    .edge-hit   { cursor: pointer; }
    .gen-sym    { cursor: pointer; }
  </style>
</head>
<body>

<div id="header">
  <h1>⚡ NEM Single Line Diagram</h1>
  <div style="display:flex;gap:3px">
    <button class="state-btn" data-state="Queensland">QLD</button>
    <button class="state-btn" data-state="New South Wales">NSW</button>
    <button class="state-btn active" data-state="Victoria">VIC</button>
    <button class="state-btn" data-state="South Australia">SA</button>
    <button class="state-btn" data-state="Tasmania">TAS</button>
  </div>
  <div class="volt-legend">
    <div class="vl"><div class="vl-line" style="width:22px;height:5px;background:#ffe033"></div>500kV</div>
    <div class="vl"><div class="vl-line" style="width:22px;height:4px;background:#f08020"></div>330kV</div>
    <div class="vl"><div class="vl-line" style="width:22px;height:3.5px;background:#d040c0"></div>275kV</div>
    <div class="vl"><div class="vl-line" style="width:22px;height:3px;background:#4496e0"></div>220kV</div>
    <div class="vl"><div class="vl-line" style="width:22px;height:2.5px;background:#d84040"></div>132kV</div>
    <div class="vl" style="font-size:9px;color:#555">── single &nbsp; ══ double circuit</div>
    <div class="vl"><div style="width:10px;height:10px;border-radius:50%;background:#3fb950;border:1.5px solid #888"></div>Operating</div>
    <div class="vl"><div style="width:10px;height:10px;border-radius:50%;background:#d29922;border:1.5px solid #888"></div>Construction</div>
  </div>
  <a href="index.html">← Map View</a>
</div>

<div id="sld-wrap">
  <svg id="sld"></svg>
  <div id="loading">Loading…</div>
  <div id="sld-popup">
    <span class="popup-close" id="popup-close">×</span>
    <div id="popup-body"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════════════════════════════════════
const VC = { 500:'#ffe033', 330:'#f08020', 275:'#d040c0', 220:'#4496e0', 132:'#d84040', 110:'#d84040' };
const VW = { 500:5.5, 330:5, 275:4.5, 220:4, 132:3, 110:3 };

const BUS_SPACING = 60;   // vertical gap between bus bars
const BUS_PAD     = 14;   // padding at each end of bus bar beyond last connection
const SLOT_W      = 22;   // horizontal space per connection slot
const BUS_MIN_HW  = 55;   // minimum bus bar half-width
const XFMR_R      = 9;    // transformer circle radius
const GEN_R       = 10;   // generator symbol radius
const GEN_STEP    = 26;   // horizontal spacing between gen symbols
const SIM_TICKS   = 400;
const GAP_PX      = 8;    // pixels either side of a crossing gap

// ══════════════════════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════════════════════
let allLines, allSubs, allProjects, allMlf;
let currentState = 'Victoria';

// ══════════════════════════════════════════════════════════════════════════════
//  SVG + ZOOM
// ══════════════════════════════════════════════════════════════════════════════
const wrap = document.getElementById('sld-wrap');
const svg  = d3.select('#sld');
const root = svg.append('g').attr('id', 'root');

const zb = d3.zoom().scaleExtent([0.05, 14])
  .on('zoom', ({transform}) => root.attr('transform', transform));
svg.call(zb);

// Dismiss popup on canvas click (not on popup itself)
svg.on('click', () => hidePopup());

// ══════════════════════════════════════════════════════════════════════════════
//  POPUP
// ══════════════════════════════════════════════════════════════════════════════
const popupEl   = document.getElementById('sld-popup');
const popupBody = document.getElementById('popup-body');
document.getElementById('popup-close').addEventListener('click', hidePopup);

function showPopup(html, svgX, svgY) {
  popupBody.innerHTML = html;
  popupEl.style.display = 'block';

  // Convert SVG coords to screen coords via current transform
  const t = d3.zoomTransform(svg.node());
  const sx = t.applyX(svgX);
  const sy = t.applyY(svgY);

  const pw = popupEl.offsetWidth  || 280;
  const ph = popupEl.offsetHeight || 200;
  const vw = wrap.clientWidth;
  const vh = wrap.clientHeight;

  popupEl.style.left = Math.min(sx + 12, vw - pw - 8) + 'px';
  popupEl.style.top  = Math.min(Math.max(sy - ph / 2, 4), vh - ph - 4) + 'px';
}
function hidePopup() { popupEl.style.display = 'none'; }

// ══════════════════════════════════════════════════════════════════════════════
//  DATA LOADING
// ══════════════════════════════════════════════════════════════════════════════
Promise.all([
  fetch('transmission_lines.geojson').then(r => r.json()),
  fetch('substations.geojson').then(r => r.json()),
  fetch('competing_projects.geojson').then(r => r.json()),
  fetch('data/mlf_2026_27.json').then(r => r.json()).catch(() => []),
]).then(([l, s, p, m]) => {
  allLines = l; allSubs = s; allProjects = p; allMlf = m;
  document.getElementById('loading').style.display = 'none';
  renderState(currentState);
});

document.querySelectorAll('.state-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.state-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentState = btn.dataset.state;
    hidePopup();
    renderState(currentState);
  });
});

// ══════════════════════════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════════════════════════
function normSub(s) {
  if (!s) return '';
  s = s.replace(/\s+\([^)]+\)\s*$/, '');
  s = s.replace(/\s+(terminal\s+station|terminal|substation|tee|tap)\s*$/gi, '');
  s = s.replace(/\s+(north|south|east|west)\s*$/gi, '');
  return s.trim();
}

function parseEps(name) {
  if (!name) return null;
  const m = name.match(/^(.+?)\s+to\s+(.+?)(?:\s+\([^)]+\))*\s*$/i);
  return m ? [m[1].trim(), m[2].trim()] : null;
}

function techCode(es) {
  if (!es) return 'GEN';
  const l = es.toLowerCase();
  if (l.includes('wind'))  return 'W';
  if (l.includes('solar') || l.includes('csp') || l.includes('floating')) return 'PV';
  if (l.includes('battery') || l.includes('lib') || l.includes('flow') || l.includes('caes')) return 'BESS';
  if (l === 'conventional hydro')  return 'H';
  if (l === 'pumped storage')      return 'PS';
  if (l.includes('gas') || l.includes('electrolyzer')) return 'GT';
  if (l.includes('coal'))  return 'SG';
  if (l.includes('bio') || l.includes('methane')) return 'BIO';
  return 'GEN';
}

function mlfClass(v) {
  if (v == null) return '';
  return v >= 0.97 ? 'mlf-good' : v >= 0.93 ? 'mlf-ok' : 'mlf-poor';
}

// Build MLF load lookup: substation name → mlf record
function buildMlfLoadLookup() {
  const lk = new Map();
  (allMlf || []).forEach(r => {
    if (r.type === 'Load') {
      const key = normSub(r.name || '');
      if (key && !lk.has(key)) lk.set(key, r);
    }
  });
  return lk;
}

// Build MLF gen lookup: project name → mlf record
function buildMlfGenLookup() {
  const lk = new Map();
  (allMlf || []).forEach(r => {
    if (r.type === 'Gen') {
      const key = (r.name || '').toLowerCase().trim();
      if (key && !lk.has(key)) lk.set(key, r);
    }
  });
  return lk;
}

// ══════════════════════════════════════════════════════════════════════════════
//  BUILD NETWORK
// ══════════════════════════════════════════════════════════════════════════════
function buildNetwork(stateName, minKv = 132) {
  const stateLines = allLines.features.filter(f =>
    f.properties.state === stateName &&
    (f.properties.voltage_kv || 0) >= minKv
  );

  const subMap  = new Map();
  const edgeMap = new Map();
  const geoAcc  = new Map();

  function getSub(raw) {
    const id = normSub(raw);
    if (!id) return null;
    if (!subMap.has(id)) {
      subMap.set(id, {
        id, label: id,
        voltages: new Set(),
        conCount: new Map(),
        conEdges: new Map(),   // kv -> [edgeId]
        xfmrCount: 0,
        generators: [],
        mlfLoad: null,
        geo: null, x: 0, y: 0,
      });
    }
    return subMap.get(id);
  }

  function accGeo(id, lng, lat) {
    if (!geoAcc.has(id)) geoAcc.set(id, {lng:0,lat:0,n:0});
    const g = geoAcc.get(id); g.lng+=lng; g.lat+=lat; g.n++;
  }

  for (const f of stateLines) {
    const p  = f.properties;
    const kv = parseInt(p.voltage_kv) || 0;
    const eps = parseEps(p.name);
    if (!eps) continue;
    const [fr, to] = eps;
    const fSub = getSub(fr), tSub = getSub(to);
    if (!fSub || !tSub || fSub === tSub) continue;

    fSub.voltages.add(kv); tSub.voltages.add(kv);

    const coords = f.geometry.coordinates;
    accGeo(fSub.id, coords[0][0], coords[0][1]);
    accGeo(tSub.id, coords[coords.length-1][0], coords[coords.length-1][1]);

    const eKey = [...[fSub.id, tSub.id].sort(), kv].join('\x01');
    if (!edgeMap.has(eKey)) {
      edgeMap.set(eKey, {
        id: eKey, from: fSub.id, to: tSub.id, voltage: kv,
        circuits: 0, name: p.name,
        normRating: p.psse_norm_min_mva || null,
        emergRating: p.psse_emerg_min_mva || null,
        lengthM: p.length_m || null,
      });
    }
    const edge = edgeMap.get(eKey);
    edge.circuits++;
    // Keep best (max) ratings across parallel circuits
    if (p.psse_norm_min_mva)  edge.normRating  = Math.max(edge.normRating  || 0, p.psse_norm_min_mva);
    if (p.psse_emerg_min_mva) edge.emergRating = Math.max(edge.emergRating || 0, p.psse_emerg_min_mva);
  }

  // Set average geo, sort voltages, build conCount
  const edges = [...edgeMap.values()];
  for (const [id, g] of geoAcc) {
    const sub = subMap.get(id);
    if (sub) sub.geo = { lng: g.lng/g.n, lat: g.lat/g.n };
  }
  for (const sub of subMap.values()) {
    sub.voltages = [...sub.voltages].sort((a,b) => b-a);
    for (const e of edges) {
      if (e.from === sub.id || e.to === sub.id) {
        sub.conCount.set(e.voltage, (sub.conCount.get(e.voltage)||0) + 1);
        if (!sub.conEdges.has(e.voltage)) sub.conEdges.set(e.voltage, []);
        sub.conEdges.get(e.voltage).push(e);
      }
    }
  }

  // Enrich with xfmr_count
  for (const sub of subMap.values()) {
    const match = allSubs.features.find(s =>
      normSub(s.properties.name) === sub.id &&
      (s.properties.state === stateName || !s.properties.state)
    );
    if (match?.properties?.xfmr_count > 0) sub.xfmrCount = match.properties.xfmr_count;
    else if (sub.voltages.length > 1)       sub.xfmrCount = 2;
  }

  // Enrich with MLF load
  const mlfLoadLookup = buildMlfLoadLookup();
  for (const sub of subMap.values()) {
    sub.mlfLoad = mlfLoadLookup.get(sub.id) || null;
  }

  // Match generators (Operating + Construction) to nearest substation ≤ 0.7°
  const mlfGenLookup = buildMlfGenLookup();
  const stateProj = allProjects.features.filter(f =>
    f.properties.state === stateName &&
    ['Operating', 'Construction'].includes(f.properties.dev_status)
  );
  for (const proj of stateProj) {
    const [pLng, pLat] = proj.geometry.coordinates;
    let best = null, bestD = 0.7;
    for (const sub of subMap.values()) {
      if (!sub.geo) continue;
      const d = Math.hypot(pLng - sub.geo.lng, pLat - sub.geo.lat);
      if (d < bestD) { bestD = d; best = sub; }
    }
    if (best) {
      const p = proj.properties;
      const mlfRec = mlfGenLookup.get((p.name||'').toLowerCase().trim()) || null;
      best.generators.push({
        label: p.name, tech: techCode(p.energy_source),
        mw: Math.round(p.capacity_mw || 0),
        status: p.dev_status, es: p.energy_source || '–',
        company: p.company || p.developer || null,
        mlfGen: mlfRec?.mlf_2026_27 || null,
        mlfImp: mlfRec?.mlf_import_2026_27 || null,
        mlfExp: mlfRec?.mlf_export_2026_27 || null,
      });
    }
  }

  return { substations: subMap, edges };
}

// ══════════════════════════════════════════════════════════════════════════════
//  LAYOUT — geographic init on large canvas + D3 force (forceX/Y anchor)
// ══════════════════════════════════════════════════════════════════════════════
function busHalfW(sub, kv) {
  return Math.max(BUS_MIN_HW, (sub.conCount.get(kv) || 1) * SLOT_W + BUS_PAD);
}
function busRelY(sub, kv) {
  const i = sub.voltages.indexOf(kv);
  return (i >= 0 ? i : 0) * BUS_SPACING;
}
function colRadius(sub) {
  if (!sub) return 90;
  const maxHW = Math.max(BUS_MIN_HW, ...sub.voltages.map(kv => busHalfW(sub, kv)));
  const h = (sub.voltages.length - 1) * BUS_SPACING + (sub.generators.length > 0 ? 55 : 20);
  return Math.hypot(maxHW + 35, h / 2 + 20);
}

function layoutNetwork({ substations, edges }) {
  const n    = substations.size;
  const VW2  = Math.max(2800, Math.ceil(Math.sqrt(n) * 290));
  const VH2  = Math.ceil(VW2 * 0.68);
  const PAD  = 150;

  const subsArr = [...substations.values()].filter(s => s.geo);
  if (!subsArr.length) return { vw: VW2, vh: VH2 };

  const lngs = subsArr.map(s => s.geo.lng);
  const lats = subsArr.map(s => s.geo.lat);
  const lngR = (Math.max(...lngs) - Math.min(...lngs)) || 1;
  const latR = (Math.max(...lats) - Math.min(...lats)) || 1;
  const minLng = Math.min(...lngs), minLat = Math.min(...lats);

  for (const sub of subsArr) {
    sub.x = PAD + (sub.geo.lng - minLng) / lngR * (VW2 - 2*PAD);
    sub.y = PAD + (1 - (sub.geo.lat - minLat) / latR) * (VH2 - 2*PAD);
  }

  // Force simulation: anchor to geo + strong repulsion + collision
  const nodes = subsArr.map(s => ({ id: s.id, x: s.x, y: s.y, gx: s.x, gy: s.y }));
  const links = edges
    .filter(e => substations.has(e.from) && substations.has(e.to))
    .map(e => ({ source: e.from, target: e.to }));

  const sim = d3.forceSimulation(nodes)
    .force('link',    d3.forceLink(links).id(d => d.id).distance(230).strength(0.10))
    .force('charge',  d3.forceManyBody().strength(-900))
    .force('cx',      d3.forceX(d => d.gx).strength(0.35))
    .force('cy',      d3.forceY(d => d.gy).strength(0.35))
    .force('collide', d3.forceCollide().radius(d => colRadius(substations.get(d.id))).iterations(4))
    .stop();

  for (let i = 0; i < SIM_TICKS; i++) sim.tick();

  for (const node of nodes) {
    const sub = substations.get(node.id);
    if (sub) { sub.x = node.x; sub.y = node.y; }
  }

  return { vw: VW2, vh: VH2 };
}

// ══════════════════════════════════════════════════════════════════════════════
//  CONNECTION X-OFFSETS — spread stubs along bus bar in angular order
// ══════════════════════════════════════════════════════════════════════════════
function computeConX({ substations, edges }) {
  const busCons = new Map();
  for (const e of edges) {
    for (const [myId, othId] of [[e.from, e.to], [e.to, e.from]]) {
      const k = `${myId}|${e.voltage}`;
      if (!busCons.has(k)) busCons.set(k, []);
      busCons.get(k).push({ e, othId });
    }
  }

  const conX = new Map();
  for (const [k, cons] of busCons) {
    const [subId, kvStr] = k.split('|');
    const kv  = parseInt(kvStr);
    const sub = substations.get(subId);
    if (!sub || !cons.length) continue;

    cons.sort((a, b) => {
      const as = substations.get(a.othId), bs = substations.get(b.othId);
      if (!as || !bs) return 0;
      return Math.atan2(as.y - sub.y, as.x - sub.x) -
             Math.atan2(bs.y - sub.y, bs.x - sub.x);
    });

    const hw = busHalfW(sub, kv);
    const n  = cons.length;
    cons.forEach(({ e }, i) => {
      const xo = n === 1 ? 0 : -hw + BUS_PAD + (2*(hw - BUS_PAD) / (n > 1 ? n-1 : 1)) * i;
      conX.set(`${e.id}|${subId}`, xo);
    });
  }
  return conX;
}

// ══════════════════════════════════════════════════════════════════════════════
//  CROSSING GAPS — detect intersections, break lower-priority line
// ══════════════════════════════════════════════════════════════════════════════
function segIntersect(a, b) {
  const d1x=a.x2-a.x1, d1y=a.y2-a.y1;
  const d2x=b.x2-b.x1, d2y=b.y2-b.y1;
  const cross = d1x*d2y - d1y*d2x;
  if (Math.abs(cross) < 0.1) return null;
  const dx=b.x1-a.x1, dy=b.y1-a.y1;
  const t1=(dx*d2y - dy*d2x)/cross;
  const t2=(dx*d1y - dy*d1x)/cross;
  if (t1>0.03 && t1<0.97 && t2>0.03 && t2<0.97) return {t1, t2};
  return null;
}

function computeGapTs({ edges, substations }, conX) {
  // Build edge geometry (centre line used for intersection; double-circuits share same path)
  const geom = new Map();
  for (const e of edges) {
    const fs = substations.get(e.from), ts = substations.get(e.to);
    if (!fs || !ts) continue;
    const fxo = conX.get(`${e.id}|${e.from}`) ?? 0;
    const txo = conX.get(`${e.id}|${e.to}`)   ?? 0;
    geom.set(e.id, {
      x1: fs.x + fxo, y1: fs.y + busRelY(fs, e.voltage),
      x2: ts.x + txo, y2: ts.y + busRelY(ts, e.voltage),
    });
  }

  const gapTs = new Map();

  for (let i = 0; i < edges.length; i++) {
    for (let j = i+1; j < edges.length; j++) {
      const e1=edges[i], e2=edges[j];
      // Adjacent edges (share a substation) don't cross in any meaningful way
      if (e1.from===e2.from || e1.from===e2.to || e1.to===e2.from || e1.to===e2.to) continue;
      const g1=geom.get(e1.id), g2=geom.get(e2.id);
      if (!g1||!g2) continue;

      const ix = segIntersect(g1, g2);
      if (!ix) continue;

      // Lower voltage (or lower circuits if same voltage) gets the gap
      const pri1 = e1.voltage * 10000 + e1.circuits * 100;
      const pri2 = e2.voltage * 10000 + e2.circuits * 100;
      const [gapE, t] = pri1 < pri2 ? [e1, ix.t1] : [e2, ix.t2];
      if (!gapTs.has(gapE.id)) gapTs.set(gapE.id, []);
      gapTs.get(gapE.id).push(t);
    }
  }

  return { gapTs, geom };
}

function pathWithGaps(g, ts) {
  const dx=g.x2-g.x1, dy=g.y2-g.y1;
  const len = Math.hypot(dx,dy) || 1;
  const dT  = GAP_PX / len;

  const sorted = (ts||[]).slice().sort((a,b)=>a-b);
  // Merge overlapping gaps
  const merged = [];
  for (const t of sorted) {
    const lo=t-dT, hi=t+dT;
    if (merged.length && lo < merged[merged.length-1].hi + dT) {
      merged[merged.length-1].hi = Math.max(merged[merged.length-1].hi, hi);
    } else {
      merged.push({lo, hi});
    }
  }

  if (!merged.length) return `M${g.x1},${g.y1}L${g.x2},${g.y2}`;

  let d = `M${g.x1},${g.y1}`;
  for (const {lo, hi} of merged) {
    const lx=(g.x1+Math.max(0,lo)*dx).toFixed(1), ly=(g.y1+Math.max(0,lo)*dy).toFixed(1);
    const hx=(g.x1+Math.min(1,hi)*dx).toFixed(1), hy=(g.y1+Math.min(1,hi)*dy).toFixed(1);
    d += ` L${lx},${ly} M${hx},${hy}`;
  }
  d += ` L${g.x2},${g.y2}`;
  return d;
}

// ══════════════════════════════════════════════════════════════════════════════
//  POPUP BUILDERS
// ══════════════════════════════════════════════════════════════════════════════
function popupSubstation(sub, stateName) {
  let h = `<div class="popup-title">${sub.label}</div>`;
  h += `<div class="popup-grid">`;
  h += `<span class="popup-label">State</span><span class="popup-value">${stateName}</span>`;
  h += `<span class="popup-label">Voltages</span><span class="popup-value">${sub.voltages.join(' / ')} kV</span>`;
  if (sub.xfmrCount > 0)
    h += `<span class="popup-label">Transformers</span><span class="popup-value">${sub.xfmrCount}</span>`;
  h += `</div>`;

  // Connections per voltage
  if (sub.voltages.length > 0) {
    h += `<div class="popup-section"><div class="popup-section-title">Connected Lines</div>`;
    for (const kv of sub.voltages) {
      const elist = (sub.conEdges.get(kv) || []);
      const others = elist.map(e => (e.from === sub.id ? e.to : e.from) + (e.circuits > 1 ? ` ×${e.circuits}` : '')).join(', ');
      h += `<div style="font-size:11px;margin-bottom:3px"><span style="color:${VC[kv]||'#888'};font-weight:700">${kv}kV</span>: ${others || '–'}</div>`;
    }
    h += `</div>`;
  }

  // MLF load
  if (sub.mlfLoad) {
    const m = sub.mlfLoad;
    h += `<div class="popup-section"><div class="popup-section-title">MLF Load 2026–27</div>`;
    h += `<div class="popup-grid">`;
    if (m.mlf_2026_27) h += `<span class="popup-label">Load MLF</span><span class="popup-value ${mlfClass(m.mlf_2026_27)}">${(+m.mlf_2026_27).toFixed(4)}</span>`;
    if (m.tni)         h += `<span class="popup-label">TNI</span><span class="popup-value">${m.tni}</span>`;
    h += `</div></div>`;
  }

  return h;
}

function popupLine(edge, stateName) {
  let h = `<div class="popup-title">${edge.name || 'Transmission Line'}</div>`;
  h += `<div class="popup-grid">`;
  h += `<span class="popup-label">Voltage</span><span class="popup-value">${edge.voltage} kV</span>`;
  h += `<span class="popup-label">Circuits</span><span class="popup-value">${edge.circuits}</span>`;
  h += `<span class="popup-label">State</span><span class="popup-value">${stateName}</span>`;
  h += `<span class="popup-label">From</span><span class="popup-value">${edge.from}</span>`;
  h += `<span class="popup-label">To</span><span class="popup-value">${edge.to}</span>`;
  if (edge.lengthM)
    h += `<span class="popup-label">Length</span><span class="popup-value">${(edge.lengthM/1000).toFixed(1)} km</span>`;
  h += `</div>`;
  if (edge.normRating || edge.emergRating) {
    h += `<div class="popup-section"><div class="popup-section-title">Ratings (PSSE)</div>`;
    h += `<div class="popup-grid">`;
    if (edge.normRating)  h += `<span class="popup-label">Normal (N)</span><span class="popup-value">${Math.round(edge.normRating)} MVA</span>`;
    if (edge.emergRating) h += `<span class="popup-label">Emergency</span><span class="popup-value">${Math.round(edge.emergRating)} MVA</span>`;
    h += `</div></div>`;
  }
  return h;
}

function popupGenerator(gen) {
  const col = gen.status === 'Operating' ? '#3fb950' : '#d29922';
  let h = `<div class="popup-title">${gen.label}</div>`;
  h += `<div class="popup-grid">`;
  h += `<span class="popup-label">Status</span><span class="popup-value" style="color:${col}">${gen.status}</span>`;
  h += `<span class="popup-label">Technology</span><span class="popup-value">${gen.es}</span>`;
  if (gen.mw > 0)
    h += `<span class="popup-label">Capacity</span><span class="popup-value">${gen.mw.toLocaleString()} MW</span>`;
  if (gen.company)
    h += `<span class="popup-label">Developer</span><span class="popup-value">${gen.company}</span>`;
  h += `</div>`;

  const hasDual = gen.mlfImp != null && gen.mlfExp != null;
  if (gen.mlfGen != null || hasDual) {
    h += `<div class="popup-section"><div class="popup-section-title">MLF Gen 2026–27</div>`;
    if (hasDual) {
      h += `<div class="popup-grid">`;
      h += `<span class="popup-label">Export</span><span class="popup-value ${mlfClass(gen.mlfExp)}">${(+gen.mlfExp).toFixed(4)}</span>`;
      h += `<span class="popup-label">Import</span><span class="popup-value ${mlfClass(gen.mlfImp)}">${(+gen.mlfImp).toFixed(4)}</span>`;
      h += `</div>`;
    } else if (gen.mlfGen) {
      h += `<div class="popup-grid"><span class="popup-label">MLF</span><span class="popup-value ${mlfClass(gen.mlfGen)}">${(+gen.mlfGen).toFixed(4)}</span></div>`;
    }
    h += `</div>`;
  }
  return h;
}

function popupTransformer(sub, fromKv, toKv) {
  let h = `<div class="popup-title">Transformer</div>`;
  h += `<div class="popup-grid">`;
  h += `<span class="popup-label">Substation</span><span class="popup-value">${sub.label}</span>`;
  h += `<span class="popup-label">Primary</span><span class="popup-value" style="color:${VC[fromKv]||'#888'}">${fromKv} kV</span>`;
  h += `<span class="popup-label">Secondary</span><span class="popup-value" style="color:${VC[toKv]||'#888'}">${toKv} kV</span>`;
  h += `<span class="popup-label">Count</span><span class="popup-value">${sub.xfmrCount}</span>`;
  h += `</div>`;
  return h;
}

// ══════════════════════════════════════════════════════════════════════════════
//  DRAW
// ══════════════════════════════════════════════════════════════════════════════
function drawSLD({ substations, edges }, conX, gapTs, geom, stateName) {
  root.selectAll('*').remove();

  const edgeG = root.append('g').attr('class', 'edges');
  const subG  = root.append('g').attr('class', 'substations');

  // ── Edges ─────────────────────────────────────────────────────────────────
  for (const e of edges) {
    const fs = substations.get(e.from), ts = substations.get(e.to);
    if (!fs || !ts) continue;

    const g    = geom.get(e.id);
    const col  = VC[e.voltage] || '#8b5e3c';
    const lw   = VW[e.voltage] || 2;
    const myTs = gapTs.get(e.id) || [];

    const eg = edgeG.append('g');

    if (e.circuits >= 2) {
      // Two parallel lines offset perpendicular
      const dx=g.x2-g.x1, dy=g.y2-g.y1, len=Math.hypot(dx,dy)||1;
      const off=4.5;
      const ox=-dy/len*off, oy=dx/len*off;
      // Shift geom for each line, reuse gap logic
      const g1={x1:g.x1+ox,y1:g.y1+oy,x2:g.x2+ox,y2:g.y2+oy};
      const g2={x1:g.x1-ox,y1:g.y1-oy,x2:g.x2-ox,y2:g.y2-oy};
      eg.append('path').attr('d', pathWithGaps(g1, myTs))
        .attr('stroke', col).attr('stroke-width', lw).attr('fill', 'none').attr('opacity', 0.88);
      eg.append('path').attr('d', pathWithGaps(g2, myTs))
        .attr('stroke', col).attr('stroke-width', lw).attr('fill', 'none').attr('opacity', 0.88);
      // Circuit count tick marks (short perpendicular dashes at midpoint)
      if (e.circuits > 2) {
        const mx=(g.x1+g.x2)/2, my=(g.y1+g.y2)/2;
        const tl=9;
        for (let k=-1; k<=1; k++) {
          const tx=mx+k*dx/len*6, ty=my+k*dy/len*6;
          eg.append('line')
            .attr('x1',tx-oy/off*tl).attr('y1',ty+ox/off*tl)
            .attr('x2',tx+oy/off*tl).attr('y2',ty-ox/off*tl)
            .attr('stroke',col).attr('stroke-width',1.5).attr('opacity',0.7);
        }
      }
    } else {
      eg.append('path').attr('d', pathWithGaps(g, myTs))
        .attr('stroke', col).attr('stroke-width', lw).attr('fill', 'none').attr('opacity', 0.88);
    }

    // Wide invisible hit area
    eg.append('line').attr('class','edge-hit')
      .attr('x1',g.x1).attr('y1',g.y1).attr('x2',g.x2).attr('y2',g.y2)
      .attr('stroke','transparent').attr('stroke-width', Math.max(lw+10, 16))
      .on('click', function(ev) {
        ev.stopPropagation();
        showPopup(popupLine(e, stateName), (g.x1+g.x2)/2, (g.y1+g.y2)/2);
      });
  }

  // ── Substations ───────────────────────────────────────────────────────────
  for (const sub of substations.values()) {
    const sg = subG.append('g')
      .attr('class','sub-group')
      .attr('transform', `translate(${sub.x},${sub.y})`);

    const volts  = sub.voltages;
    const maxHW  = Math.max(BUS_MIN_HW, ...volts.map(kv => busHalfW(sub, kv)));

    // Background hit area (captures click on the substation box)
    const totalH = (volts.length-1)*BUS_SPACING + (sub.generators.length > 0 ? GEN_R*2+35 : 5);
    sg.append('rect')
      .attr('x', -maxHW-8).attr('y', -24)
      .attr('width', (maxHW+8)*2).attr('height', totalH+32)
      .attr('fill','transparent').attr('stroke','none')
      .on('click', function(ev) {
        ev.stopPropagation();
        showPopup(popupSubstation(sub, stateName), sub.x, sub.y);
      });

    // ── Bus bars ─────────────────────────────────────────────────────────
    for (let i = 0; i < volts.length; i++) {
      const kv  = volts[i];
      const by  = i * BUS_SPACING;
      const hw  = busHalfW(sub, kv);
      const col = VC[kv] || '#8b5e3c';
      const bw  = VW[kv] || 2;

      sg.append('line')
        .attr('x1',-hw).attr('x2',hw).attr('y1',by).attr('y2',by)
        .attr('stroke',col).attr('stroke-width',bw+2).attr('stroke-linecap','square');

      // kV label at right end
      sg.append('text')
        .attr('x',hw+7).attr('y',by+4.5)
        .attr('font-size',8).attr('font-weight','600').attr('fill',col)
        .text(`${kv}kV`);
    }

    // ── Name label above top bus bar ─────────────────────────────────────
    sg.append('text')
      .attr('x',0).attr('y',-16)
      .attr('text-anchor','middle')
      .attr('font-weight','bold').attr('font-size',10).attr('fill','#1a1a2e')
      .text(sub.label);

    // ── Transformer symbols between consecutive voltage levels ────────────
    for (let i = 0; i < volts.length-1; i++) {
      const y1   = i * BUS_SPACING;
      const y2   = (i+1) * BUS_SPACING;
      const nX   = Math.min(Math.max(sub.xfmrCount || 2, 1), 4);
      const step = 24;
      const totW = (nX-1) * step;

      for (let t = 0; t < nX; t++) {
        const cx    = -totW/2 + t * step;
        const topCY = y1 + XFMR_R + 4;
        const botCY = y2 - XFMR_R - 4;

        // Stubs
        sg.append('line')
          .attr('x1',cx).attr('y1',y1).attr('x2',cx).attr('y2',topCY-XFMR_R)
          .attr('stroke','#2a2a3a').attr('stroke-width',1.5);
        sg.append('line')
          .attr('x1',cx).attr('y1',y2).attr('x2',cx).attr('y2',botCY+XFMR_R)
          .attr('stroke','#2a2a3a').attr('stroke-width',1.5);

        // Circles
        const xfGroup = sg.append('g').style('cursor','pointer')
          .on('click', (ev) => {
            ev.stopPropagation();
            showPopup(popupTransformer(sub, volts[i], volts[i+1]), sub.x + cx, sub.y + (y1+y2)/2);
          });

        xfGroup.append('circle')
          .attr('cx',cx).attr('cy',topCY).attr('r',XFMR_R)
          .attr('stroke','#2a2a3a').attr('fill','rgba(250,250,248,0.95)').attr('stroke-width',1.5);
        xfGroup.append('circle')
          .attr('cx',cx).attr('cy',botCY).attr('r',XFMR_R)
          .attr('stroke','#2a2a3a').attr('fill','rgba(250,250,248,0.95)').attr('stroke-width',1.5);
      }
    }

    // ── Generators below lowest bus bar ──────────────────────────────────
    if (sub.generators.length > 0) {
      const lastY = (volts.length-1) * BUS_SPACING;
      const genY  = lastY + GEN_R + 22;
      const n     = sub.generators.length;
      const totW  = (n-1) * GEN_STEP;

      sub.generators.forEach((gen, gi) => {
        const gx  = -totW/2 + gi*GEN_STEP;
        const gcol = gen.status === 'Operating' ? '#3fb950' : '#d29922';

        sg.append('line')
          .attr('x1',gx).attr('y1',lastY).attr('x2',gx).attr('y2',genY-GEN_R)
          .attr('stroke','#777').attr('stroke-width',1);

        const gg = sg.append('g').attr('class','gen-sym')
          .on('click', (ev) => {
            ev.stopPropagation();
            showPopup(popupGenerator(gen), sub.x + gx, sub.y + genY);
          });

        gg.append('circle')
          .attr('cx',gx).attr('cy',genY).attr('r',GEN_R)
          .attr('fill',gcol).attr('opacity',0.9)
          .attr('stroke','rgba(250,250,248,0.8)').attr('stroke-width',1.2);

        gg.append('text')
          .attr('x',gx).attr('y',genY+3.5)
          .attr('text-anchor','middle')
          .attr('font-size',6).attr('font-weight','bold').attr('fill','#fff')
          .text(gen.tech.slice(0,4));
      });

      // Total MW label
      const totalMW = sub.generators.reduce((s,g) => s+g.mw, 0);
      if (totalMW > 0) {
        sg.append('text')
          .attr('x',0).attr('y',genY+GEN_R+12)
          .attr('text-anchor','middle').attr('font-size',7).attr('fill','#555')
          .text(totalMW.toLocaleString()+'MW');
      }
    }
  }
}

// ══════════════════════════════════════════════════════════════════════════════
//  FIT VIEW
// ══════════════════════════════════════════════════════════════════════════════
function fitView({ substations }) {
  const subsArr = [...substations.values()];
  if (!subsArr.length) return;

  const xs = subsArr.map(s => s.x);
  const ys = subsArr.map(s => s.y);
  const x0=Math.min(...xs)-160, x1=Math.max(...xs)+160;
  const y0=Math.min(...ys)-50,  y1=Math.max(...ys)+80;
  const bw=x1-x0, bh=y1-y0;
  const vw=wrap.clientWidth, vh=wrap.clientHeight;
  const scale = Math.min(vw/bw, vh/bh) * 0.92;
  const tx = (vw - bw*scale)/2 - x0*scale;
  const ty = (vh - bh*scale)/2 - y0*scale;
  svg.call(zb.transform, d3.zoomIdentity.translate(tx,ty).scale(scale));
}

// ══════════════════════════════════════════════════════════════════════════════
//  MAIN
// ══════════════════════════════════════════════════════════════════════════════
function renderState(stateName) {
  if (!allLines) return;
  const loadEl = document.getElementById('loading');
  loadEl.textContent = `Building ${stateName} SLD…`;
  loadEl.style.display = 'block';

  setTimeout(() => {
    const net  = buildNetwork(stateName, 132);
    layoutNetwork(net);
    const conX = computeConX(net);
    const { gapTs, geom } = computeGapTs(net, conX);
    drawSLD(net, conX, gapTs, geom, stateName);
    fitView(net);
    loadEl.style.display = 'none';
  }, 30);
}
